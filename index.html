<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 16px;
    font-family: Arial, sans-serif;
    background: #f4f5f7;
    color: #202124;
}

.app {
    max-width: 500px;
    margin: 0 auto;
}

/* =========================
   ШАПКА
========================= */

.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 5px 4px 20px;
}

.app-header h1 {
    margin: 0;
    font-size: 26px;
}

/* =========================
   КОТИК
========================= */

.cat-wrapper {
    position: relative;
}

.cat {
    width: 58px;
    height: 58px;
    object-fit: cover;
    border-radius: 16px;
    cursor: pointer;
    transition: transform .15s ease;
}

.cat:active {
    transform: scale(.9) rotate(-5deg);
}

.cat-speech {
    position: absolute;
    right: 0;
    top: 68px;
    width: 230px;
    background: white;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.3;
    box-shadow: 0 4px 18px rgba(0,0,0,.15);
    opacity: 0;
    transform: translateY(-8px) scale(.95);
    pointer-events: none;
    transition: .2s ease;
    z-index: 100;
}

.cat-speech.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.cat-speech::before {
    content: "";
    position: absolute;
    top: -8px;
    right: 20px;
    width: 16px;
    height: 16px;
    background: white;
    transform: rotate(45deg);
}

/* =========================
   БАЛАНС
========================= */

.balance-card {
    background: #202124;
    color: white;
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 18px;
}

.balance-title {
    font-size: 14px;
    opacity: .7;
}

.total {
    font-size: 32px;
    font-weight: bold;
    margin: 8px 0 20px;
}

.currencies {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.currency {
    background: rgba(255,255,255,.1);
    border-radius: 12px;
    padding: 10px;
}

.currency-name {
    font-size: 13px;
    opacity: .7;
}

.currency-value {
    margin-top: 5px;
    font-size: 15px;
    font-weight: bold;
}

/* =========================
   ВКЛАДКИ
========================= */

.tabs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 18px;
}

.tab {
    border: none;
    border-radius: 12px;
    padding: 12px 5px;
    background: white;
    font-size: 14px;
    cursor: pointer;
}

.tab.active {
    background: #202124;
    color: white;
}

/* =========================
   СЕКЦИИ
========================= */

.section {
    background: white;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 16px;
    overflow: hidden;
}

.section-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 14px;
}

/* =========================
   КАТЕГОРИИ
========================= */

.category {
    display: grid;
    grid-template-columns: minmax(90px, 1fr) minmax(0, 2fr);
    gap: 12px;
    align-items: start;
    padding: 13px 0;
    border-bottom: 1px solid #eee;
}

.category:last-child {
    border-bottom: none;
}

.category-name {
    font-size: 15px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.category-amount {
    font-size: 15px;
    font-weight: bold;
    line-height: 1.4;
    text-align: right;
    overflow-wrap: anywhere;
}

.expense-amount {
    color: #d93025;
}

.income-amount {
    color: #188038;
}

.section-total {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) minmax(0, 2fr);
    gap: 12px;
    border-top: 1px solid #eee;
    margin-top: 8px;
    padding-top: 14px;
    font-weight: bold;
}

.section-total span:last-child {
    text-align: right;
    overflow-wrap: anywhere;
}

.empty {
    color: #777;
    padding: 10px 0;
}

/* =========================
   ПОСЛЕДНИЕ ОПЕРАЦИИ
========================= */

.last10-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
}

.last10-arrow {
    font-size: 20px;
    transition: transform .2s ease;
}

.last10-section.open .last10-arrow {
    transform: rotate(180deg);
}

.last10-content {
    display: none;
    margin-top: 12px;
}

.last10-section.open .last10-content {
    display: block;
}

.operation-card {
    padding: 13px 0;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.operation-card:last-child {
    border-bottom: none;
}

.operation-card:active {
    background: #f5f5f5;
}

.operation-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.operation-category {
    font-size: 15px;
    font-weight: bold;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.operation-amount {
    font-size: 15px;
    font-weight: bold;
    white-space: nowrap;
}

.operation-amount.expense {
    color: #d93025;
}

.operation-amount.income {
    color: #188038;
}

.operation-info {
    margin-top: 5px;
    color: #777;
    font-size: 13px;
}

.operation-id {
    margin-top: 3px;
    color: #999;
    font-size: 12px;
}

.operation-hint {
    margin-top: 5px;
    color: #aaa;
    font-size: 11px;
}

/* =========================
   КНОПКА
========================= */

.add-button {
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 17px;
    font-weight: bold;
    background: #202124;
    color: white;
    cursor: pointer;
}

/* =========================
   ОШИБКА
========================= */

.error {
    display: none;
    background: #ffe5e5;
    color: #b00020;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 16px;
}

/* =========================
   TOAST
========================= */

.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #202124;
    color: white;
    padding: 14px 20px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: bold;
    opacity: 0;
    pointer-events: none;
    transition: .25s ease;
    z-index: 2000;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* =========================
   МОДАЛКИ
========================= */

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
}

.modal-overlay.show {
    display: flex;
}

.modal-box {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 22px 22px 0 0;
    padding: 22px 18px 24px;
    transform: translateY(100%);
    transition: transform .25s ease;
}

.modal-overlay.show .modal-box {
    transform: translateY(0);
}

.form-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

.form-title {
    font-size: 20px;
    font-weight: bold;
}

.close-button {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: #f1f3f4;
    font-size: 20px;
    cursor: pointer;
}

.add-form input,
.add-form select {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    background: white;
}

.submit-button,
.cancel-button,
.delete-button {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    margin-top: 6px;
    cursor: pointer;
}

.submit-button {
    background: #202124;
    color: white;
}

.cancel-button {
    background: #f1f3f4;
    color: #202124;
}

.delete-button {
    background: #d93025;
    color: white;
}

button:disabled {
    opacity: .6;
    cursor: wait;
}

.delete-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}

.delete-text {
    color: #666;
    line-height: 1.4;
    margin-bottom: 20px;
}

/* =========================
   АДАПТИВ
========================= */

@media (max-width: 420px) {

    .app-header h1 {
        font-size: 23px;
    }

    .category {
        grid-template-columns: minmax(75px,.8fr) minmax(0,2fr);
        gap: 8px;
    }

    .category-name,
    .category-amount {
        font-size: 14px;
    }

    .section-total {
        grid-template-columns: minmax(115px,.9fr) minmax(0,2fr);
        font-size: 14px;
    }

    .cat-speech {
        right: -5px;
        width: 210px;
    }

}

</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="app">

    <div class="app-header">

        <h1>💰 Мои финансы</h1>

        <div class="cat-wrapper">

            <div id="cat-speech" class="cat-speech"></div>

            <img
                class="cat"

        </div>

    </div>

    <div id="error" class="error"></div>

    <div class="balance-card">

        <div class="balance-title">

        <div class="total">

        </div>

        <div class="currencies">

            <div class="currency">
                <div class="currency-name">🇺🇸 USD</div>
                <div class="currency-value usd">...</div>
            </div>

            <div class="currency">

<!-- ДОБАВЛЕНИЕ -->

<div id="add-modal-overlay" class="modal-overlay">

    <div class="modal-box add-form">

        <div class="form-header">

        <select id="operation-type">

                🔴 Расход

                🟢 Доход

        </select>

        <input
            id="amount"
            type="number"
            placeholder="Сумма"
        >

        <select id="currency">

            <option value="UZS">🇺🇿 UZS</option>
            <option value="RUB">🇷🇺 RUB</option>
            <option value="USD">🇺🇸 USD</option>

        </select>

        <select id="category">

            <option value="Продукты">🛒 Продукты</option>
            <option value="Кафе">☕ Кафе</option>

            <option value="Дом">🏠 Дом</option>
            <option value="Здоровье">💊 Здоровье</option>
            <option value="Красота">💄 Красота</option>
            <option value="Одежда">👕 Одежда</option>
            <option value="Развлечения">🎮 Развлечения</option>
            <option value="Подарки">🎁 Подарки</option>
            <option value="Подписки">📺 Подписки</option>
            <option value="Алкоголь">🍻 Алкоголь</option>

</div>


<!-- УДАЛЕНИЕ -->

<div id="delete-modal-overlay" class="modal-overlay">

    <div class="modal-box">

        <div class="delete-title">
            🗑 Удалить операцию?
        </div>

        <div id="delete-text" class="delete-text"></div>

        <button
            id="delete-button"
            class="delete-button"
            onclick="deleteOperation()"
        >
            🗑 Удалить
        </button>

        <button
            class="cancel-button"
            onclick="closeDeleteModal()"
        >
            Отмена
        </button>

    </div>

</div>


<script>

const MAKE_WEBHOOK_URL =
"https://hook.eu1.make.com/rbaqfgqxqlzyvb6s7imcpnhx3k2igjgo";

let currentPeriod = "today";
let selectedOperationId = null;
let catSpeechTimer;


/* =========================
   КОТИК
========================= */

const catPhrases = [

    "Эй! Ты опять тратишь деньги?! 😾",
    "Я всё вижу! 😼",
    "Может, начнёшь экономить? 😾",
    "Куда столько денег уходит?! 🙀",
    "Опять расход?! Ты серьёзно?! 😿",
    "Я слежу за твоим бюджетом! 👀",
    "Мяу... это была действительно нужная покупка? 🤨",
    "У тебя денег больше не станет, если ты будешь их тратить! 😾",
    "Так, спокойно. Дышим. И больше ничего не покупаем! 😤"

];

function catSpeak() {

    const speech =
        document.querySelector("#cat-speech");

    speech.textContent =
        catPhrases[
            Math.floor(
                Math.random() * catPhrases.length
            )
        ];

    speech.classList.add("show");

    clearTimeout(catSpeechTimer);

    catSpeechTimer =
        setTimeout(() => {

            speech.classList.remove("show");

        }, 3500);

}


/* =========================
   ФОРМАТ ЧИСЕЛ
========================= */

function formatNumber(value) {

    if (
        value === undefined ||
        value === null ||
        value === ""
    ) {
        return "0";
    }

    const number =
        Number(
            String(value)
                .replace(/\s/g, "")
                .replace(",", ".")
        );

    if (isNaN(number)) {
        return String(value);
    }

    return number.toLocaleString(
        "ru-RU",
        {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        }
    );

}


/* =========================
   TOAST
========================= */

function showToast(message) {

    const toast =
        document.querySelector("#toast");

    toast.textContent = message;

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    }, 2500);

}


/* =========================
   ПЕРИОД
========================= */

function getPeriodData(data, period) {

    return {

        expenses:
            period === "today"
                ? data.today_expenses
                : data.month_expenses,

        income:
            period === "today"
                ? data.today_income
                : data.month_income

    };

}


/* =========================
   РАЗБОР СУММ
========================= */

function parseAmounts(line) {

    const matches =
        line.matchAll(
            /([\d\s]+(?:[,.]\d+)?)\s*(UZS|RUB|USD)/gi
        );

    const result = [];

    for (const match of matches) {

        result.push({

            amount:
                Number(
                    match[1]
                        .replace(/\s/g, "")
                        .replace(",", ".")
                ),

            currency:
                match[2].toUpperCase()

        });

    }

    return result;

}


/* =========================
   РАСХОДЫ И ДОХОДЫ
========================= */

function renderText(
    elementId,
    text,
    emptyText,
    type
) {

    const container =
        document.querySelector("#" + elementId);

    if (
        !text ||
        !String(text).trim()
    ) {

        container.innerHTML =
            `<div class="empty">${emptyText}</div>`;

        return;

    }

    const lines =
        String(text)
            .split("\n")
            .map(line => line.trim())
            .filter(Boolean);

    container.innerHTML = "";

    const totals = {};

    lines.forEach(line => {

        const amounts =
            parseAmounts(line);

        amounts.forEach(item => {

            if (!totals[item.currency]) {
                totals[item.currency] = 0;
            }

            totals[item.currency] += item.amount;

        });

        const separator =
            line.match(/\s*(—|–|-|•)\s*/);

        const row =
            document.createElement("div");

        row.className = "category";

        if (!separator) {

            row.textContent = line;

            container.appendChild(row);

            return;

        }

        const name =
            line
                .substring(0, separator.index)
                .trim();

        const amountText =
            line
                .substring(
                    separator.index +
                    separator[0].length
                )
                .trim();

        const nameElement =
            document.createElement("div");

        nameElement.className =
            "category-name";

        nameElement.textContent =
            name;

        const amountElement =
            document.createElement("div");

        amountElement.className =
            "category-amount";

        amountElement.classList.add(
            type === "expense"
                ? "expense-amount"
                : "income-amount"
        );

        amountElement.textContent =
            type === "expense"
                ? "− " + amountText
                : "+ " + amountText;

        row.appendChild(nameElement);
        row.appendChild(amountElement);

        container.appendChild(row);

    });

    const totalRow =
        document.createElement("div");

    totalRow.className =
        "section-total";

    const title =
        document.createElement("span");

    title.textContent =
        type === "expense"
            ? "Итого расходов"
            : "Итого доходов";

    const value =
        document.createElement("span");

    value.textContent =
        Object.entries(totals)
            .map(
                ([currency, amount]) =>
                    `${formatNumber(amount)} ${currency}`
            )
            .join(" · ");

    totalRow.appendChild(title);
    totalRow.appendChild(value);

    container.appendChild(totalRow);

}


/* =========================
   ПОСЛЕДНИЕ ОПЕРАЦИИ
========================= */

function toggleLast10() {

    document
        .querySelector(".last10-section")
        .classList
        .toggle("open");

}


function renderLast10(text) {

    const container =
        document.querySelector("#last10");

    if (
        !text ||
        !String(text).trim()
    ) {

        container.innerHTML =
            `<div class="empty">Операций нет</div>`;

        return;

    }

    const blocks =
        String(text)
            .split("──────── ✦ ────────")
            .map(block => block.trim())
            .filter(Boolean);

    container.innerHTML = "";

    blocks.forEach(block => {

        const lines =
            block
                .split("\n")
                .map(line => line.trim())
                .filter(Boolean);

        const dateLine =
            lines.find(line =>
                line.startsWith("📅")
            );

        const moneyLine =
            lines.find(line =>
                line.startsWith("💵")
            );

        const idLine =
            lines.find(line =>
                line.startsWith("🆔")
            );

        const categoryLine =
            lines.find(line =>
                !line.startsWith("👤") &&
                !line.startsWith("📅") &&
                !line.startsWith("💵") &&
                !line.startsWith("🆔")
            );

        if (!idLine || !moneyLine) {
            return;
        }

        const operationId =
            idLine
                .replace("🆔", "")
                .trim();

        const isIncome =
            moneyLine.includes("🟢") ||
            moneyLine.includes("Доход");

        const amountText =
            moneyLine
                .replace("💵", "")
                .replace("🔴", "")
                .replace("🟢", "")
                .replace("Расход", "")
                .replace("Доход", "")
                .trim();

        const card =
            document.createElement("div");

        card.className =
            "operation-card";

        card.addEventListener(
            "click",
            () => {

                openDeleteModal(
                    operationId,
                    categoryLine || "Операция",
                    amountText
                );

            }
        );

        const top =
            document.createElement("div");

        top.className =
            "operation-top";

        const category =
            document.createElement("div");

        category.className =
            "operation-category";

        category.textContent =
            categoryLine || "Операция";

        const amount =
            document.createElement("div");

        amount.className =
            "operation-amount " +
            (isIncome ? "income" : "expense");

        amount.textContent =
            (isIncome ? "+ " : "− ") +
            amountText;

        top.appendChild(category);
        top.appendChild(amount);

        const date =
            document.createElement("div");

        date.className =
            "operation-info";

        date.textContent =
            dateLine || "";

        const id =
            document.createElement("div");

        id.className =
            "operation-id";

        id.textContent =
            idLine;

        const hint =
            document.createElement("div");

        hint.className =
            "operation-hint";

        hint.textContent =
            "Нажмите, чтобы удалить";

        card.appendChild(top);
        card.appendChild(date);
        card.appendChild(id);
        card.appendChild(hint);

        container.appendChild(card);

    });

}


/* =========================
   ЗАГРУЗКА
========================= */

async function loadData(period = "today") {

    currentPeriod =
        period;

    const error =
        document.querySelector("#error");

    error.style.display =
        "none";

    try {

        const response =
            await fetch(
                MAKE_WEBHOOK_URL,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body:
                        JSON.stringify({
                            action:
                                "get_finance_data",

                            period:
                                period
                        })
                }
            );

        if (!response.ok) {
            throw new Error("HTTP error");
        }

        const data =
            await response.json();

        document.querySelector(".total")
            .textContent =
                "≈ " +
                formatNumber(data.total_usd) +
                " USD";

        document.querySelector(".usd")
            .textContent =
                formatNumber(data.usd);

        document.querySelector(".uzs")
            .textContent =
                formatNumber(data.uzs);

        document.querySelector(".rub")
            .textContent =
                formatNumber(data.rub);

        const periodData =
            getPeriodData(
                data,
                period
            );

        renderText(
            "expenses",
            periodData.expenses,
            "Расходов нет",
            "expense"
        );

        renderText(
            "income",
            periodData.income,
            "Доходов нет",
            "income"
        );

        renderLast10(
            data.last10
        );

    } catch (error) {

        console.error(error);

        document.querySelector("#error")
            .textContent =
                "❌ Не удалось загрузить данные";

        document.querySelector("#error")
            .style.display =
                "block";

    }

}


/* =========================
   ДОБАВЛЕНИЕ
========================= */

function openAddForm() {

    document
        .querySelector("#add-modal-overlay")
        .classList
        .add("show");

}

function closeAddForm() {

    document
        .querySelector("#add-modal-overlay")
        .classList
        .remove("show");

}


async function addOperation() {

    const type =
        document.querySelector("#operation-type").value;

    const amount =
        document.querySelector("#amount").value;

    const currency =
        document.querySelector("#currency").value;

    const category =
        document.querySelector("#category").value;

    const description =
        document.querySelector("#description").value;

    if (
        !amount ||
        Number(amount) <= 0
    ) {

        showToast("⚠️ Введите сумму");

        return;

    }

    const button =
        document.querySelector("#submit-button");

    button.disabled =
        true;

    button.textContent =
        "⏳ Добавляем...";

    try {

        const response =
            await fetch(
                MAKE_WEBHOOK_URL,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body:
                        JSON.stringify({

                            action:
                                "add_operation",

                            type:
                                type,

                            amount:
                                amount,

                            currency:
                                currency,

                            category:
                                category,

                            description:
                                description

                        })
                }
            );

        if (!response.ok) {
            throw new Error("Ошибка");
        }

        closeAddForm();

        document.querySelector("#amount")
            .value = "";

        document.querySelector("#description")
            .value = "";

        showToast(
            "✅ Операция добавлена"
        );

        await loadData(
            currentPeriod
        );

    } catch (error) {

        console.error(error);

        showToast(
            "❌ Не удалось добавить операцию"
        );

    } finally {

        button.disabled =
            false;

        button.textContent =
            "Добавить";

    }

}


/* =========================
   УДАЛЕНИЕ
========================= */

function openDeleteModal(
    operationId,
    category,
    amount
) {

    selectedOperationId =
        operationId;

    document.querySelector("#delete-text")
        .textContent =
            `Удалить операцию «${category}» на сумму ${amount}?`;

    document
        .querySelector("#delete-modal-overlay")
        .classList
        .add("show");

}


function closeDeleteModal() {

    selectedOperationId =
        null;

    document
        .querySelector("#delete-modal-overlay")
        .classList
        .remove("show");

}


async function deleteOperation() {

    if (!selectedOperationId) {
        return;
    }

    const button =
        document.querySelector("#delete-button");

    button.disabled =
        true;

    button.textContent =
        "⏳ Удаляем...";

    try {

        const response =
            await fetch(
                MAKE_WEBHOOK_URL,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body:
                        JSON.stringify({

                            action:
                                "delete_operation",

                            id:
                                selectedOperationId

                        })
                }
            );

        if (!response.ok) {
            throw new Error("Ошибка удаления");
        }

        closeDeleteModal();

        showToast(
            "🗑 Операция удалена"
        );

        await loadData(
            currentPeriod
        );

    } catch (error) {

        console.error(error);

        showToast(
            "❌ Не удалось удалить операцию"
        );

    } finally {

        button.disabled =
            false;

        button.textContent =
            "🗑 Удалить";

    }

}


/* =========================
   ВКЛАДКИ
========================= */

document
    .querySelectorAll(".tab")
    .forEach(button => {

        button.addEventListener(
            "click",
            () => {

                document
                    .querySelectorAll(".tab")
                    .forEach(btn =>
                        btn.classList
                            .remove("active")
                    );

                button.classList
                    .add("active");

                loadData(
                    button.dataset.period
                );

            }
        );

    });


/* =========================
   ЗАКРЫТИЕ МОДАЛОК
========================= */

document
    .querySelector("#add-modal-overlay")
    .addEventListener(
        "click",
        event => {

            if (
                event.target.id ===
                "add-modal-overlay"
            ) {

                closeAddForm();

            }

        }
    );


document
    .querySelector("#delete-modal-overlay")
    .addEventListener(
        "click",
        event => {

            if (
                event.target.id ===
                "delete-modal-overlay"
            ) {

                closeDeleteModal();

            }

        }
    );


/* =========================
   ESC
========================= */

document.addEventListener(
    "keydown",
    event => {

        if (event.key === "Escape") {

            closeAddForm();
            closeDeleteModal();

        }

    }
);


/* =========================
   ЗАПУСК
========================= */

loadData("today");

</script>

</html>
