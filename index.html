<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансы</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: #f4f5f7;
            color: #202124;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 5px 4px 20px;
        }

        .app-header h1 {
            margin: 0;
            font-size: 26px;
        }

        .cat {
            width: 58px;
            height: 58px;
            object-fit: cover;
            border-radius: 16px;
            flex-shrink: 0;
        }

        .balance-card {
            background: #202124;
            color: white;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 18px;
        }

        .balance-title {
            font-size: 14px;
            opacity: 0.7;
        }

        .total {
            font-size: 32px;
            font-weight: bold;
            margin: 8px 0 20px;
        }

        .currencies {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .currency {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
        }

        .currency-name {
            font-size: 13px;
            opacity: 0.7;
        }

        .currency-value {
            margin-top: 5px;
            font-size: 15px;
            font-weight: bold;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }

        .tab {
            border: none;
            border-radius: 12px;
            padding: 12px 5px;
            background: white;
            font-size: 14px;
            cursor: pointer;
        }

        .tab.active {
            background: #202124;
            color: white;
        }

        .section {
            background: white;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .category {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 13px 0;
            border-bottom: 1px solid #eee;
            min-width: 0;
        }

        .category:last-child {
            border-bottom: none;
        }

        .category-name {
            font-size: 15px;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-amount {
            font-weight: bold;
            white-space: nowrap;
            text-align: right;
            flex-shrink: 0;
            font-size: 15px;
        }

        .expense-amount {
            color: #d93025;
        }

        .income-amount {
            color: #188038;
        }

        .section-total {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            border-top: 1px solid #eee;
            margin-top: 8px;
            padding-top: 14px;
            font-weight: bold;
        }

        .section-total span:last-child {
            text-align: right;
        }

        .empty {
            color: #777;
            padding: 10px 0;
        }

        .add-button {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            background: #202124;
            color: white;
            cursor: pointer;
        }

        .error {
            background: #ffe5e5;
            color: #b00020;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #202124;
            color: white;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 2000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .add-form {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 22px 22px 0 0;
            padding: 22px 18px 24px;
            transform: translateY(100%);
            transition: transform 0.25s ease;
        }

        .modal-overlay.show .add-form {
            transform: translateY(0);
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .form-title {
            font-size: 20px;
            font-weight: bold;
        }

        .close-button {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: #f1f3f4;
            font-size: 20px;
            cursor: pointer;
        }

        .add-form input,
        .add-form select {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: white;
        }

        .submit-button,
        .cancel-button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            margin-top: 6px;
            cursor: pointer;
        }

        .submit-button {
            background: #202124;
            color: white;
        }

        .cancel-button {
            background: #f1f3f4;
            color: #202124;
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        @media (max-width: 420px) {

            .category {
                gap: 8px;
            }

            .category-name {
                font-size: 14px;
            }

            .category-amount {
                font-size: 14px;
            }

            .section-total {
                font-size: 14px;
            }

        }

    </style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="app">

    <div class="app-header">

        <h1>💰 Мои финансы</h1>

        <img
            class="cat"
            src="https://raw.githubusercontent.com/yteleev-cmd/qwerty/main/photo_2026-07-09_15-28-02.jpg"
            alt="Котик"
        >

    </div>

    <div id="error" class="error">
        Не удалось загрузить данные
    </div>

    <div class="balance-card">

        <div class="balance-title">
            Общий баланс
        </div>

        <div class="total">
            Загрузка...
        </div>

        <div class="currencies">

            <div class="currency">
                <div class="currency-name">🇺🇸 USD</div>
                <div class="currency-value usd">...</div>
            </div>

            <div class="currency">
                <div class="currency-name">🇺🇿 UZS</div>
                <div class="currency-value uzs">...</div>
            </div>

            <div class="currency">
                <div class="currency-name">🇷🇺 RUB</div>
                <div class="currency-value rub">...</div>
            </div>

        </div>

    </div>

    <div class="tabs">

        <button class="tab active" data-period="today">
            Сегодня
        </button>

        <button class="tab" data-period="month">
            Месяц
        </button>

        <button class="tab" data-period="all">
            Всё время
        </button>

    </div>

    <div class="section">

        <div class="section-title">
            💸 Расходы
        </div>

        <div id="expenses">
            Загрузка...
        </div>

    </div>

    <div class="section">

        <div class="section-title">
            💰 Доходы
        </div>

        <div id="income">
            Загрузка...
        </div>

    </div>

    <button class="add-button" onclick="openAddForm()">
        ＋ Добавить операцию
    </button>

</div>

<div id="modal-overlay" class="modal-overlay">

    <div class="add-form">

        <div class="form-header">

            <div class="form-title">
                Новая операция
            </div>

            <button
                class="close-button"
                onclick="closeAddForm()"
            >
                ×
            </button>

        </div>

        <select id="operation-type">

            <option value="Расход">
                🔴 Расход
            </option>

            <option value="Доход">
                🟢 Доход
            </option>

        </select>

        <input
            id="amount"
            type="number"
            placeholder="Сумма"
        >

        <select id="currency">

            <option value="UZS">
                🇺🇿 UZS
            </option>

            <option value="RUB">
                🇷🇺 RUB
            </option>

            <option value="USD">
                🇺🇸 USD
            </option>

        </select>

        <select id="category">

            <option value="Продукты">
                🛒 Продукты
            </option>

            <option value="Кафе">
                ☕ Кафе
            </option>

            <option value="Транспорт">
                🚕 Транспорт
            </option>

            <option value="Дом">
                🏠 Дом
            </option>

            <option value="Здоровье">
                💊 Здоровье
            </option>

            <option value="Красота">
                💄 Красота
            </option>

            <option value="Одежда">
                👕 Одежда
            </option>

            <option value="Развлечения">
                🎮 Развлечения
            </option>

            <option value="Подарки">
                🎁 Подарки
            </option>

            <option value="Подписки">
                📺 Подписки
            </option>

            <option value="Алкоголь">
                🍻 Алкоголь
            </option>

            <option value="Хобби">
                🎨 Хобби
            </option>

            <option value="Прочее">
                📦 Прочее
            </option>

        </select>

        <input
            id="description"
            type="text"
            placeholder="Описание (необязательно)"
        >

        <button
            id="submit-button"
            class="submit-button"
            onclick="addOperation()"
        >
            Добавить
        </button>

        <button
            class="cancel-button"
            onclick="closeAddForm()"
        >
            Отмена
        </button>

    </div>

</div>

<script>

const MAKE_WEBHOOK_URL =
"https://hook.eu1.make.com/rbaqfgqxqlzyvb6s7imcpnhx3k2igjgo";


let currentPeriod = "today";


function formatNumber(value) {

    if (
        value === undefined ||
        value === null
    ) {
        return "";
    }

    const number =
        Number(
            String(value)
                .replace(/\s/g, "")
                .replace(",", ".")
        );

    if (isNaN(number)) {
        return value;
    }

    return number.toLocaleString("ru-RU", {

        minimumFractionDigits: 0,

        maximumFractionDigits: 2

    });

}


function showToast(message) {

    const toast =
        document.querySelector("#toast");

    toast.textContent =
        message;

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    }, 2500);

}


function getPeriodData(data, period) {

    if (period === "today") {

        return {

            expenses: data.today_expenses,

            income: data.today_income

        };

    }

    if (period === "month") {

        return {

            expenses: data.month_expenses,

            income: data.month_income

        };

    }

    return {

        expenses: data.all_expenses,

        income: data.all_income

    };

}


function parseAmounts(line) {

    const matches =
        line.matchAll(
            /([\d\s]+(?:[,.]\d+)?)\s*(UZS|RUB|USD)/gi
        );

    const amounts = [];

    for (const match of matches) {

        const amount =
            Number(
                match[1]
                    .replace(/\s/g, "")
                    .replace(",", ".")
            );

        const currency =
            match[2].toUpperCase();

        amounts.push({

            amount: amount,

            currency: currency

        });

    }

    return amounts;

}


function renderText(

    elementId,

    text,

    emptyText,

    type

) {

    const container =
        document.querySelector(
            "#" + elementId
        );


    if (
        !text ||
        text.trim() === ""
    ) {

        container.innerHTML =
            `<div class="empty">${emptyText}</div>`;

        return;

    }


    const lines =
        text.split("\n");


    container.innerHTML =
        "";


    const totals = {};


    lines.forEach(line => {

        if (
            line.trim() === ""
        ) {

            return;

        }


        const amounts =
            parseAmounts(line);


        amounts.forEach(amountData => {

            if (
                !totals[amountData.currency]
            ) {

                totals[amountData.currency] =
                    0;

            }

            totals[amountData.currency] +=
                amountData.amount;

        });


        const parts =
            line.split("—");


        const row =
            document.createElement("div");


        row.className =
            "category";


        if (parts.length >= 2) {

            const name =
                document.createElement("div");


            name.className =
                "category-name";


            name.textContent =
                parts[0].trim();


            const amount =
                document.createElement("div");


            amount.className =
                "category-amount";


            if (type === "expense") {

                amount.classList.add(
                    "expense-amount"
                );

                amount.textContent =
                    "− " +
                    parts.slice(1)
                        .join("—")
                        .trim();

            } else {

                amount.classList.add(
                    "income-amount"
                );

                amount.textContent =
                    "+ " +
                    parts.slice(1)
                        .join("—")
                        .trim();

            }


            row.appendChild(name);

            row.appendChild(amount);

        } else {

            row.textContent =
                line;

        }


        container.appendChild(row);

    });


    const totalRow =
        document.createElement("div");


    totalRow.className =
        "section-total";


    const totalTitle =
        document.createElement("span");


    totalTitle.textContent =
        type === "expense"
            ? "Итого расходов"
            : "Итого доходов";


    const totalValue =
        document.createElement("span");


    const totalParts =
        Object.entries(totals)
            .map(
                ([currency, amount]) => {

                    return (
                        formatNumber(amount) +
                        " " +
                        currency
                    );

                }
            );


    totalValue.textContent =
        totalParts.join(" · ");


    totalRow.appendChild(totalTitle);

    totalRow.appendChild(totalValue);


    container.appendChild(totalRow);

}


async function loadData(
    period = "today"
) {

    currentPeriod =
        period;


    try {

        document.querySelector(
            "#error"
        ).style.display =
            "none";


        const response =
            await fetch(

                MAKE_WEBHOOK_URL,

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        action:
                            "get_finance_data",

                        period:
                            period

                    })

                }

            );


        if (!response.ok) {

            throw new Error(
                "Ошибка HTTP"
            );

        }


        const data =
            await response.json();


        document.querySelector(
            ".total"
        ).textContent =
            "≈ " +
            formatNumber(
                data.total_usd
            ) +
            " USD";


        document.querySelector(
            ".usd"
        ).textContent =
            formatNumber(
                data.usd
            );


        document.querySelector(
            ".uzs"
        ).textContent =
            formatNumber(
                data.uzs
            );


        document.querySelector(
            ".rub"
        ).textContent =
            formatNumber(
                data.rub
            );


        const periodData =
            getPeriodData(
                data,
                period
            );


        renderText(

            "expenses",

            periodData.expenses,

            "Расходов нет",

            "expense"

        );


        renderText(

            "income",

            periodData.income,

            "Доходов нет",

            "income"

        );


    } catch (error) {

        console.error(error);


        document.querySelector(
            "#error"
        ).style.display =
            "block";


        document.querySelector(
            "#error"
        ).textContent =
            "❌ Не удалось загрузить данные";

    }

}


function openAddForm() {

    document
        .querySelector(
            "#modal-overlay"
        )
        .classList.add(
            "show"
        );

}


function closeAddForm() {

    document
        .querySelector(
            "#modal-overlay"
        )
        .classList.remove(
            "show"
        );

}


async function addOperation() {

    const type =
        document.querySelector(
            "#operation-type"
        ).value;


    const amount =
        document.querySelector(
            "#amount"
        ).value;


    const currency =
        document.querySelector(
            "#currency"
        ).value;


    const category =
        document.querySelector(
            "#category"
        ).value;


    const description =
        document.querySelector(
            "#description"
        ).value;


    if (
        !amount ||
        Number(amount) <= 0
    ) {

        showToast(
            "⚠️ Введите сумму"
        );

        return;

    }


    const button =
        document.querySelector(
            "#submit-button"
        );


    button.disabled =
        true;


    button.textContent =
        "⏳ Добавляем операцию...";


    try {

        const response =
            await fetch(

                MAKE_WEBHOOK_URL,

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        action:
                            "add_operation",

                        type:
                            type,

                        amount:
                            amount,

                        currency:
                            currency,

                        category:
                            category,

                        description:
                            description

                    })

                }

            );


        if (!response.ok) {

            throw new Error(
                "Ошибка добавления операции"
            );

        }


        closeAddForm();


        document.querySelector(
            "#amount"
        ).value =
            "";


        document.querySelector(
            "#description"
        ).value =
            "";


        showToast(
            "✅ Операция добавлена"
        );


        await loadData(
            currentPeriod
        );


    } catch (error) {

        console.error(error);


        showToast(
            "❌ Не удалось добавить операцию"
        );


    } finally {

        button.disabled =
            false;


        button.textContent =
            "Добавить";

    }

}


document
    .querySelectorAll(
        ".tab"
    )
    .forEach(
        button => {

            button.addEventListener(

                "click",

                () => {

                    document
                        .querySelectorAll(
                            ".tab"
                        )
                        .forEach(
                            btn => {

                                btn.classList
                                    .remove(
                                        "active"
                                    );

                            }
                        );


                    button.classList
                        .add(
                            "active"
                        );


                    const period =
                        button.dataset
                            .period;


                    loadData(
                        period
                    );

                }

            );

        }

    );


document
    .querySelector(
        "#modal-overlay"
    )
    .addEventListener(

        "click",

        event => {

            if (
                event.target.id ===
                "modal-overlay"
            ) {

                closeAddForm();

            }

        }

    );


loadData(
    "today"
);

</script>

</body>
</html>
