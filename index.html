<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 16px;
    font-family: Arial, sans-serif;
    background: #f4f5f7;
    color: #202124;
}

.app {
    max-width: 500px;
    margin: 0 auto;
}

/* =========================
   ШАПКА
========================= */

.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 5px 4px 18px;
}

.app-header h1 {
    margin: 0;
    font-size: 25px;
}

.cat-wrapper {
    position: relative;
}

.cat {
    width: 58px;
    height: 58px;
    object-fit: cover;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.15s ease;
}

.cat:active {
    transform: scale(0.9) rotate(-5deg);
}

.cat-speech {
    position: absolute;
    right: 0;
    top: 68px;
    width: 230px;
    background: white;
    color: #202124;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.3;
    box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translateY(-8px) scale(0.95);
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 100;
}

.cat-speech.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* =========================
   БАЛАНС
========================= */

.balance-card {
    background: #202124;
    color: white;
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 16px;
}

.balance-title {
    font-size: 14px;
    opacity: 0.7;
}

.total {
    font-size: 32px;
    font-weight: bold;
    margin: 8px 0 20px;
}

.currencies {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.currency {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px;
}

.currency-name {
    font-size: 13px;
    opacity: 0.7;
}

.currency-value {
    margin-top: 5px;
    font-size: 15px;
    font-weight: bold;
}

/* =========================
   ВКЛАДКИ
========================= */

.tabs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}

.tab {
    border: none;
    border-radius: 12px;
    padding: 12px 5px;
    background: white;
    font-size: 14px;
    cursor: pointer;
}

.tab.active {
    background: #202124;
    color: white;
}

/* =========================
   СЕКЦИИ
========================= */

.section {
    background: white;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 16px;
    overflow: hidden;
}

.section-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 14px;
}

/* =========================
   КАТЕГОРИИ
========================= */

.category {
    display: grid;
    grid-template-columns: minmax(90px, 1fr) minmax(0, 2fr);
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid #eee;
}

.category:last-child {
    border-bottom: none;
}

.category-name {
    font-size: 15px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.category-amount {
    font-weight: bold;
    text-align: right;
    font-size: 15px;
    line-height: 1.4;
    overflow-wrap: anywhere;
}

.expense-amount {
    color: #d93025;
}

.income-amount {
    color: #188038;
}

.section-total {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) minmax(0, 2fr);
    gap: 12px;
    border-top: 1px solid #eee;
    margin-top: 8px;
    padding-top: 14px;
    font-weight: bold;
}

.section-total span:last-child {
    text-align: right;
    line-height: 1.4;
    overflow-wrap: anywhere;
}

.empty {
    color: #777;
    padding: 10px 0;
}

/* =========================
   ПОСЛЕДНИЕ ОПЕРАЦИИ
========================= */

.last10-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.last10-arrow {
    font-size: 20px;
    transition: transform 0.2s ease;
}

.last10-section.open .last10-arrow {
    transform: rotate(180deg);
}

.last10-content {
    display: none;
    margin-top: 10px;
}

.last10-section.open .last10-content {
    display: block;
}

.operation-card {
    padding: 14px 0;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background 0.15s ease;
}

.operation-card:last-child {
    border-bottom: none;
}

.operation-card:active {
    background: #f5f5f5;
}

.operation-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}

.operation-category {
    font-size: 15px;
    font-weight: bold;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.operation-amount {
    font-size: 15px;
    font-weight: bold;
    text-align: right;
    white-space: nowrap;
}

.operation-amount.expense {
    color: #d93025;
}

.operation-amount.income {
    color: #188038;
}

.operation-info {
    margin-top: 5px;
    color: #777;
    font-size: 13px;
}

.operation-id {
    margin-top: 3px;
    color: #999;
    font-size: 12px;
}

.operation-hint {
    margin-top: 5px;
    color: #aaa;
    font-size: 11px;
}

/* =========================
   КНОПКА
========================= */

.add-button {
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 17px;
    font-weight: bold;
    background: #202124;
    color: white;
    cursor: pointer;
}

/* =========================
   TOAST
========================= */

.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #202124;
    color: white;
    padding: 14px 20px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: bold;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    z-index: 2000;
    white-space: nowrap;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* =========================
   МОДАЛЬНЫЕ ОКНА
========================= */

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
}

.modal-overlay.show {
    display: flex;
}

/* ДОБАВЛЕНИЕ */

.add-form {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 22px 22px 0 0;
    padding: 22px 18px 24px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
}

.modal-overlay.show .add-form,
.modal-overlay.show .delete-modal {
    transform: translateY(0);
}

.form-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
}

.form-title {
    font-size: 20px;
    font-weight: bold;
}

.close-button {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: #f1f3f4;
    font-size: 20px;
    cursor: pointer;
}

.add-form input,
.add-form select {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    background: white;
}

.submit-button,
.cancel-button {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    margin-top: 6px;
    cursor: pointer;
}

.submit-button {
    background: #202124;
    color: white;
}

.cancel-button {
    background: #f1f3f4;
    color: #202124;
}

/* УДАЛЕНИЕ */

.delete-modal {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 22px 22px 0 0;
    padding: 24px 18px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
}

.delete-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 16px;
}

.delete-operation-card {
    background: #f4f5f7;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
}

.delete-operation-category {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
}

.delete-operation-amount {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
}

.delete-operation-amount.expense {
    color: #d93025;
}

.delete-operation-amount.income {
    color: #188038;
}

.delete-operation-info {
    color: #777;
    font-size: 14px;
    line-height: 1.5;
}

.delete-button {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    margin-top: 6px;
    cursor: pointer;
    background: #d93025;
    color: white;
}

.delete-button:disabled {
    opacity: 0.6;
}

/* =========================
   ОШИБКА
========================= */

.error {
    background: #ffe5e5;
    color: #b00020;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 16px;
    display: none;
}

/* =========================
   АДАПТИВ
========================= */

@media (max-width: 420px) {

    .app-header h1 {
        font-size: 23px;
    }

    .category {
        grid-template-columns: minmax(75px, 0.8fr) minmax(0, 2fr);
        gap: 8px;
    }

    .category-name,
    .category-amount {
        font-size: 14px;
    }

    .section-total {
        grid-template-columns: minmax(115px, 0.9fr) minmax(0, 2fr);
        font-size: 14px;
    }

    .cat-speech {
        right: -5px;
        width: 210px;
    }

}

</style>
</head>

<script>

const MAKE_WEBHOOK_URL =
"https://hook.eu1.make.com/rbaqfgqxqlzyvb6s7imcpnhx3k2igjgo";


let currentPeriod = "today";

let selectedOperationId = null;


/* =========================
   КОТИК
========================= */

const catPhrases = [

    "Эй! Ты опять тратишь деньги?! 😾",

    "Я всё вижу! 😼",

    "Может, начнёшь экономить? 😾",

    "Куда столько денег уходит?! 🙀",

    "Опять расход?! Ты серьёзно?! 😿",

    "Я слежу за твоим бюджетом! 👀",

    "Мяу... это была действительно нужная покупка? 🤨",

    "У тебя денег больше не станет, если ты будешь их тратить! 😾",

    "Так, спокойно. Дышим. И больше ничего не покупаем! 😤"

];

let catSpeechTimer;


function catSpeak() {

    const speech =
        document.querySelector("#cat-speech");

    const randomPhrase =
        catPhrases[
            Math.floor(
                Math.random() * catPhrases.length
            )
        ];

    speech.textContent =
        randomPhrase;

    speech.classList.add("show");

    clearTimeout(catSpeechTimer);

    catSpeechTimer =
        setTimeout(() => {

            speech.classList.remove("show");

        }, 3500);

}


/* =========================
   ФОРМАТИРОВАНИЕ
========================= */

function formatNumber(value) {

    if (
        value === undefined ||
        value === null
    ) {
        return "";
    }

    const number =
        Number(
            String(value)
                .replace(/\s/g, "")
                .replace(",", ".")
        );

    if (isNaN(number)) {
        return value;
    }

    return number.toLocaleString(
        "ru-RU",
        {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        }
    );

}


/* =========================
   TOAST
========================= */

function showToast(message) {

    const toast =
        document.querySelector("#toast");

    toast.textContent =
        message;

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    }, 2500);

}


/* =========================
   ПЕРИОД
========================= */

function getPeriodData(data, period) {

    if (period === "today") {

        return {

            expenses:
                data.today_expenses,

            income:
                data.today_income

        };

    }

    if (period === "month") {

        return {

            expenses:
                data.month_expenses,

            income:
                data.month_income

        };

    }

    return {

        expenses: "",

        income: ""

    };

}


/* =========================
   РАЗБОР СУММ
========================= */

function parseAmounts(line) {

    const matches =
        line.matchAll(
            /([\d\s]+(?:[,.]\d+)?)\s*(UZS|RUB|USD)/gi
        );

    const amounts = [];

    for (const match of matches) {

        const amount =
            Number(
                match[1]
                    .replace(/\s/g, "")
                    .replace(",", ".")
            );

        const currency =
            match[2].toUpperCase();

        amounts.push({

            amount: amount,

            currency: currency

        });

    }

    return amounts;

}


/* =========================
   РАСХОДЫ И ДОХОДЫ
========================= */

function renderText(
    elementId,
    text,
    emptyText,
    type
) {

    const container =
        document.querySelector("#" + elementId);

    if (
        !text ||
        text.trim() === ""
    ) {

        container.innerHTML =
            `<div class="empty">${emptyText}</div>`;

        return;

    }

    const lines =
        text
            .split("\n")
            .map(line => line.trim())
            .filter(line => line !== "");

    container.innerHTML = "";

    const totals = {};

    lines.forEach(line => {

        const amounts =
            parseAmounts(line);

        amounts.forEach(amountData => {

            if (
                !totals[amountData.currency]
            ) {

                totals[amountData.currency] = 0;

            }

            totals[amountData.currency] +=
                amountData.amount;

        });

        const separatorMatch =
            line.match(/\s*(—|–|-|•)\s*/);

        const row =
            document.createElement("div");

        row.className = "category";

        if (separatorMatch) {

            const separatorIndex =
                separatorMatch.index;

            const name =
                line
                    .substring(0, separatorIndex)
                    .trim();

            const amountText =
                line
                    .substring(
                        separatorIndex +
                        separatorMatch[0].length
                    )
                    .trim();

            const nameElement =
                document.createElement("div");

            nameElement.className =
                "category-name";

            nameElement.textContent =
                name;

            const amountElement =
                document.createElement("div");

            amountElement.className =
                "category-amount";

            amountElement.classList.add(

                type === "expense"
                    ? "expense-amount"
                    : "income-amount"

            );

            amountElement.textContent =

                type === "expense"
                    ? "− " + amountText
                    : "+ " + amountText;

            row.appendChild(nameElement);

            row.appendChild(amountElement);

        } else {

            row.textContent = line;

        }

        container.appendChild(row);

    });

    const totalRow =
        document.createElement("div");

    totalRow.className =
        "section-total";

    const totalTitle =
        document.createElement("span");

    totalTitle.textContent =

        type === "expense"
            ? "Итого расходов"
            : "Итого доходов";

    const totalValue =
        document.createElement("span");

    const totalParts =
        Object.entries(totals)
            .map(
                ([currency, amount]) =>
                    formatNumber(amount) +
                    " " +
                    currency
            );

    totalValue.textContent =
        totalParts.join(" · ");

    totalRow.appendChild(totalTitle);

    totalRow.appendChild(totalValue);

    container.appendChild(totalRow);

}


/* =========================
   ПОСЛЕДНИЕ ОПЕРАЦИИ
========================= */

function toggleLast10() {

    const section =
        document.querySelector(".last10-section");

    section.classList.toggle("open");

}


function renderLast10(text) {

    const container =
        document.querySelector("#last10");

    if (
        !text ||
        text.trim() === ""
    ) {

        container.innerHTML =
            `<div class="empty">Операций нет</div>`;

        return;

    }

    const blocks =
        text
            .split("──────── ✦ ────────")
            .map(block => block.trim())
            .filter(block => block !== "");

    container.innerHTML = "";

    blocks.forEach(block => {

        const lines =
            block
                .split("\n")
                .map(line => line.trim())
                .filter(line => line !== "");

        if (lines.length < 3) {
            return;
        }

        const dateLine =
            lines.find(line =>
                line.startsWith("📅")
            );

        const moneyLine =
            lines.find(line =>
                line.startsWith("💵")
            );

        const categoryLine =
            lines.find(line =>
                !line.startsWith("👤") &&
                !line.startsWith("📅") &&
                !line.startsWith("💵") &&
                !line.startsWith("🆔")
            );

        const idLine =
            lines.find(line =>
                line.startsWith("🆔")
            );

        if (!idLine) {
            return;
        }

        const operationId =
            idLine
                .replace("🆔", "")
                .trim();

        const isIncome =
            moneyLine &&
            moneyLine.includes("🟢");

        let amountText =
            moneyLine || "";

        amountText =
            amountText
                .replace("💵", "")
                .replace("🔴", "")
                .replace("🟢", "")
                .replace("Расход", "")
                .replace("Доход", "")
                .trim();

        const card =
            document.createElement("div");

        card.className =
            "operation-card";

        card.onclick = () => {

            openDeleteModal({

                id: operationId,

                category:
                    categoryLine || "Операция",

                amount:
                    amountText,

                date:
                    dateLine || "",

                isIncome:
                    isIncome

            });

        };

        card.innerHTML = `

            <div class="operation-top">

                <div class="operation-category">

                    ${categoryLine || "Операция"}

                </div>

                <div class="operation-amount ${isIncome ? "income" : "expense"}">

                    ${isIncome ? "+ " : "− "}${amountText}

                </div>

            </div>

            <div class="operation-info">

                ${dateLine || ""}

            </div>

            <div class="operation-id">

                ${idLine || ""}

            </div>

            <div class="operation-hint">

                Нажмите, чтобы удалить

            </div>

        `;

        container.appendChild(card);

    });

}


/* =========================
   ЗАГРУЗКА ДАННЫХ
========================= */

async function loadData(period = "today") {

    currentPeriod =
        period;

    try {

        document.querySelector("#error")
            .style.display = "none";

        const response =
            await fetch(

                MAKE_WEBHOOK_URL,

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        action:
                            "get_finance_data",

                        period:
                            period

                    })

                }

            );

        if (!response.ok) {

            throw new Error(
                "Ошибка HTTP"
            );

        }

        const data =
            await response.json();

        document.querySelector(".total")
            .textContent =

            "≈ " +
            formatNumber(data.total_usd) +
            " USD";

        document.querySelector(".usd")
            .textContent =
            formatNumber(data.usd);

        document.querySelector(".uzs")
            .textContent =
            formatNumber(data.uzs);

        document.querySelector(".rub")
            .textContent =
            formatNumber(data.rub);

        const periodData =
            getPeriodData(
                data,
                period
            );

        renderText(
            "expenses",
            periodData.expenses,
            "Расходов нет",
            "expense"
        );

        renderText(
            "income",
            periodData.income,
            "Доходов нет",
            "income"
        );

        renderLast10(
            data.last10
        );

    } catch (error) {

        console.error(error);

        document.querySelector("#error")
            .style.display =
            "block";

        document.querySelector("#error")
            .textContent =
            "❌ Не удалось загрузить данные";

    }

}


/* =========================
   ДОБАВЛЕНИЕ
========================= */

function openAddForm() {

    document
        .querySelector("#add-modal-overlay")
        .classList.add("show");

}


function closeAddForm() {

    document
        .querySelector("#add-modal-overlay")
        .classList.remove("show");

}


async function addOperation() {

    const type =
        document.querySelector("#operation-type")
            .value;

    const amount =
        document.querySelector("#amount")
            .value;

    const currency =
        document.querySelector("#currency")
            .value;

    const category =
        document.querySelector("#category")
            .value;

    const description =
        document.querySelector("#description")
            .value;

    if (
        !amount ||
        Number(amount) <= 0
    ) {

        showToast(
            "⚠️ Введите сумму"
        );

        return;

    }

    const button =
        document.querySelector("#submit-button");

    button.disabled = true;

    button.textContent =
        "⏳ Добавляем операцию...";

    try {

        const response =
            await fetch(

                MAKE_WEBHOOK_URL,

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        action:
                            "add_operation",

                        type:
                            type,

                        amount:
                            amount,

                        currency:
                            currency,

                        category:
                            category,

                        description:
                            description

                    })

                }

            );

        if (!response.ok) {

            throw new Error(
                "Ошибка добавления операции"
            );

        }

        closeAddForm();

        document.querySelector("#amount")
            .value = "";

        document.querySelector("#description")
            .value = "";

        showToast(
            "✅ Операция добавлена"
        );

        await loadData(
            currentPeriod
        );

    } catch (error) {

        console.error(error);

        showToast(
            "❌ Не удалось добавить операцию"
        );

    } finally {

        button.disabled = false;

        button.textContent =
            "Добавить";

    }

}


/* =========================
   КРАСИВОЕ ОКНО УДАЛЕНИЯ
========================= */

function openDeleteModal(operation) {

    selectedOperationId =
        operation.id;

    const category =
        document.querySelector(
            "#delete-operation-category"
        );

    const amount =
        document.querySelector(
            "#delete-operation-amount"
        );

    const info =
        document.querySelector(
            "#delete-operation-info"
        );

    const id =
        document.querySelector(
            "#delete-operation-id"
        );

    category.textContent =
        operation.category;

    amount.textContent =
        (operation.isIncome ? "+ " : "− ") +
        operation.amount;

    amount.className =
        "delete-operation-amount " +
        (
            operation.isIncome
                ? "income"
                : "expense"
        );

    info.textContent =
        operation.date;

    id.textContent =
        "🆔 " +
        operation.id;

    document
        .querySelector(
            "#delete-modal-overlay"
        )
        .classList.add("show");

}


function closeDeleteModal() {

    selectedOperationId =
        null;

    document
        .querySelector(
            "#delete-modal-overlay"
        )
        .classList.remove("show");

}


async function deleteOperation() {

    if (!selectedOperationId) {

        return;

    }

    const button =
        document.querySelector(
            "#delete-button"
        );

    button.disabled =
        true;

    button.textContent =
        "⏳ Удаляем...";

    try {

        const response =
            await fetch(

                MAKE_WEBHOOK_URL,

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body: JSON.stringify({

                        action:
                            "delete_operation",

                        id:
                            selectedOperationId

                    })

                }

            );

        if (!response.ok) {

            throw new Error(
                "Ошибка удаления"
            );

        }

        closeDeleteModal();

        showToast(
            "🗑 Операция удалена"
        );

        await loadData(
            currentPeriod
        );

    } catch (error) {

        console.error(error);

        showToast(
            "❌ Не удалось удалить операцию"
        );

    } finally {

        button.disabled =
            false;

        button.textContent =
            "🗑 Удалить операцию";

    }

}


/* =========================
   ПЕРЕКЛЮЧЕНИЕ ПЕРИОДОВ
========================= */

document
    .querySelectorAll(".tab")
    .forEach(button => {

        button.addEventListener(
            "click",
            () => {

                document
                    .querySelectorAll(".tab")
                    .forEach(btn => {

                        btn.classList.remove(
                            "active"
                        );

                    });

                button.classList.add(
                    "active"
                );

                loadData(
                    button.dataset.period
                );

            }
        );

    });


/* =========================
   ЗАКРЫТИЕ МОДАЛОК
========================= */

document
    .querySelector("#add-modal-overlay")
    .addEventListener(
        "click",
        event => {

            if (
                event.target.id ===
                "add-modal-overlay"
            ) {

                closeAddForm();

            }

        }
    );


document
    .querySelector("#delete-modal-overlay")
    .addEventListener(
        "click",
        event => {

            if (
                event.target.id ===
                "delete-modal-overlay"
            ) {

                closeDeleteModal();

            }

        }
    );


/* =========================
   ЗАПУСК
========================= */

loadData("today");

</script>
