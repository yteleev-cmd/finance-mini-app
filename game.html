<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>Котик против расходов</title>

<style>

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
}

html,
body {

    margin: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    font-family: Arial, sans-serif;

    background: #f4f5f7;

    user-select: none;
    -webkit-user-select: none;

}

body {

    display: flex;

    justify-content: center;
    align-items: center;

    padding: 8px;

}

button,
.game-area {

    outline: none;

}

button:focus,
button:active,
.game-area:focus,
.game-area:active {

    outline: none;

}

.game {

    width: min(100%, 520px);

    height:
        min(
            calc(100svh - 16px),
            850px
        );

    display: flex;

    flex-direction: column;

}


/* HEADER */

.header {

    min-height: 44px;

    display: flex;

    align-items: center;
    justify-content: space-between;

    gap: 8px;

    padding: 0 4px;

    font-size: 17px;

    font-weight: bold;

    flex-shrink: 0;

}

.title {

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

}

.header-right {

    display: flex;

    align-items: center;

    gap: 8px;

    flex-shrink: 0;

}

.score {

    color: #555;

    font-size: 16px;

    white-space: nowrap;

}

.exit-button {

    border: 1px solid #dcdfe3;

    padding: 7px 10px;

    border-radius: 10px;

    background: #fff;

    color: #555;

    font-size: 13px;

    cursor: pointer;

    touch-action: manipulation;

}


/* GAME */

.game-area {

    position: relative;

    flex: 1;

    min-height: 0;

    overflow: hidden;

    border-radius: 20px;

    background:
        linear-gradient(
            #dff3ff,
            #ffffff
        );

    border: 2px solid #e5e7eb;

    cursor: pointer;

    touch-action: none;

    transition:
        background 1.5s ease,
        border-color 1.5s ease;

}

.game-area.night {

    background:
        linear-gradient(
            #17233d,
            #344766
        );

    border-color: #263653;

}

.game-area.demon {

    background:
        radial-gradient(
            circle at 50% 20%,
            #5e1717,
            #230b12 45%,
            #080509 100%
        );

    border-color: #4b171d;

}


/* ACTIVE BONUSES */

.active-bonuses {

    position: absolute;

    top: 12px;
    left: 12px;

    z-index: 50;

    display: flex;

    flex-direction: column;

    gap: 6px;

    pointer-events: none;

}

.active-bonus {

    min-width: 46px;

    height: 42px;

    padding: 0 8px;

    display: flex;

    align-items: center;
    justify-content: center;

    gap: 4px;

    border-radius: 12px;

    background:
        rgba(
            255,
            255,
            255,
            .9
        );

    box-shadow:
        0 3px 10px
        rgba(
            0,
            0,
            0,
            .18
        );

    font-size: 25px;

    backdrop-filter: blur(4px);

}

.game-area.night .active-bonus {

    background:
        rgba(
            20,
            30,
            50,
            .9
        );

}

.game-area.demon .active-bonus {

    background:
        rgba(
            40,
            0,
            5,
            .9
        );

}

.active-bonus span {

    font-size: 12px;

    font-weight: bold;

}

.active-bonus.expiring {

    animation:
        bonusBlink
        .45s
        infinite
        alternate;

}

@keyframes bonusBlink {

    from {

        opacity: 1;

        transform:
            scale(1);

    }

    to {

        opacity: .25;

        transform:
            scale(1.08);

    }

}


/* SKY */

.sky {

    position: absolute;

    inset: 0;

    overflow: hidden;

    pointer-events: none;

    z-index: 0;

}

.cloud {

    position: absolute;

    font-size: 46px;

    opacity: .7;

    white-space: nowrap;

    animation:
        cloudMove
        linear
        infinite;

}

.cloud-1 {

    top: 10%;
    left: 100%;

    animation-duration: 32s;

}

.cloud-2 {

    top: 27%;
    left: 130%;

    font-size: 34px;

    opacity: .55;

    animation-duration: 42s;

    animation-delay: -15s;

}

.cloud-3 {

    top: 18%;
    left: 170%;

    font-size: 58px;

    opacity: .45;

    animation-duration: 50s;

    animation-delay: -28s;

}

@keyframes cloudMove {

    from {

        transform:
            translateX(0);

    }

    to {

        transform:
            translateX(-700px);

    }

}

.game-area.night .cloud {

    opacity: .08;

}

.game-area.demon .cloud {

    opacity: .03;

}


/* HILLS */

.background-hill {

    position: absolute;

    bottom: 65px;

    left: 0;

    width: 200%;

    height: 100px;

    opacity: .35;

    background:

        radial-gradient(
            ellipse at 20% 100%,
            #a8d69b 0 45%,
            transparent 46%
        ),

        radial-gradient(
            ellipse at 55% 100%,
            #a8d69b 0 50%,
            transparent 51%
        ),

        radial-gradient(
            ellipse at 85% 100%,
            #a8d69b 0 45%,
            transparent 46%
        );

    background-size:
        400px 100px;

    animation:
        hillsMove
        16s
        linear
        infinite;

    pointer-events: none;

}

.game-area.night .background-hill {

    opacity: .12;

    filter:
        brightness(.45);

}

.game-area.demon .background-hill {

    opacity: .22;

    filter:
        hue-rotate(280deg)
        brightness(.35);

}

@keyframes hillsMove {

    from {

        transform:
            translateX(0);

    }

    to {

        transform:
            translateX(-400px);

    }

}


/* MOON */

.moon {

    position: absolute;

    left: 75%;

    top: 18%;

    font-size: 54px;

    opacity: 0;

    z-index: 1;

    pointer-events: none;

}

.game-area.night .moon {

    animation:
        moonSlowMove
        35s
        linear
        infinite;

}

@keyframes moonSlowMove {

    from {

        transform:
            translateX(0);

    }

    to {

        transform:
            translateX(-280px);

    }

}

.moon.enter {

    animation:

        moonEnter
        1.1s
        cubic-bezier(.2,.8,.3,1)
        forwards !important;

}

@keyframes moonEnter {

    0% {

        opacity: 0;

        transform:
            translate(
                180px,
                300px
            )
            scale(.4);

    }

    55% {

        opacity: 1;

    }

    100% {

        opacity: 1;

        transform:
            translate(
                0,
                0
            )
            scale(1);

    }

}

.moon.leave {

    animation:

        moonLeave
        1.1s
        cubic-bezier(.6,.1,.8,.2)
        forwards !important;

}

@keyframes moonLeave {

    0% {

        opacity: 1;

        transform:
            translate(
                0,
                0
            );

    }

    100% {

        opacity: 0;

        transform:
            translate(
                -400px,
                250px
            )
            rotate(-30deg);

    }

}


/* DEMON SKY */

.demon-sky {

    position: absolute;

    inset: 0;

    opacity: 0;

    pointer-events: none;

    background:

        repeating-linear-gradient(

            135deg,

            transparent 0 20px,

            rgba(
                255,
                0,
                0,
                .04
            )
            21px 22px

        );

}

.game-area.demon .demon-sky {

    opacity: 1;

}


/* GROUND */

.ground {

    position: absolute;

    bottom: 0;

    left: 0;

    width: 100%;

    height: 65px;

    background: #b9df9d;

    border-top: 4px solid #8fc276;

    overflow: hidden;

    z-index: 2;

    transition:

        background 1s ease,
        border-color 1s ease;

}

.game-area.night .ground {

    background: #29452d;

    border-color: #1d3020;

}

.game-area.demon .ground {

    background: #280d13;

    border-color: #5e151d;

}

.ground-lines {

    position: absolute;

    top: 18px;

    left: 0;

    width: 200%;

    height: 6px;

    background:

        repeating-linear-gradient(

            90deg,

            transparent 0,

            transparent 35px,

            rgba(
                92,
                150,
                76,
                .25
            )
            35px 75px,

            transparent 75px,

            transparent 120px

        );

    animation:

        groundMove
        1.2s
        linear
        infinite;

}

.game-area.demon .ground-lines {

    background:

        repeating-linear-gradient(

            90deg,

            transparent 0,

            transparent 35px,

            rgba(
                255,
                50,
                50,
                .35
            )
            35px 75px,

            transparent 75px,

            transparent 120px

        );

}

@keyframes groundMove {

    from {

        transform:
            translateX(0);

    }

    to {

        transform:
            translateX(-120px);

    }

}


/* CAT */

.cat {

    position: absolute;

    left:
        clamp(
            42px,
            14vw,
            70px
        );

    bottom: 52px;

    width:
        clamp(
            58px,
            17vw,
            78px
        );

    height:
        clamp(
            58px,
            17vw,
            78px
        );

    z-index: 5;

    will-change:
        transform;

    background-repeat: no-repeat;

    background-position: 0 0;

    background-size:
        400% 100%;

}


/* BONUS ITEMS */

.cat-item {

    position: absolute;

    width: 24%;

    height: 24%;

    display: flex;

    align-items: center;
    justify-content: center;

    pointer-events: none;

    user-select: none;

    z-index: 4;

    will-change:
        transform,
        opacity;

    /* Уменьшено примерно в 2 раза */

    font-size:
        clamp(
            12px,
            3vw,
            16px
        );

    line-height: 1;

    transform-origin:
        center center;

    filter:

        drop-shadow(
            0 1px 1px
            rgba(
                0,
                0,
                0,
                .18
            )
        );

}

.cat-shield,
.cat-magnet {

    left: 0;

    top: 10%;

}


/* EXPENSE */

.expense {

    position: absolute;

    left: 100%;

    bottom: 65px;

    display: flex;

    align-items: center;
    justify-content: center;

    line-height: 1;

    white-space: nowrap;

    z-index: 4;

    filter:

        drop-shadow(
            0 4px 2px
            rgba(
                0,
                0,
                0,
                .15
            )
        );

}

.expense.small {

    font-size:
        clamp(
            42px,
            13vw,
            48px
        );

}

.expense.normal {

    font-size:
        clamp(
            52px,
            16vw,
            62px
        );

}

.expense.wide {

    font-size:
        clamp(
            65px,
            20vw,
            78px
        );

}


/* COINS */

.coin {

    position: absolute;

    left: 100%;

    width: 52px;

    height: 52px;

    display: flex;

    align-items: center;
    justify-content: center;

    font-size:
        clamp(
            38px,
            12vw,
            46px
        );

    z-index: 3;

    filter:

        drop-shadow(
            0 4px 2px
            rgba(
                0,
                0,
                0,
                .15
            )
        );

    will-change:
        left,
        bottom;

    animation:

        moneyFloat
        1.2s
        ease-in-out
        infinite
        alternate;

}

.coin.magnet-active {

    animation: none;

}

@keyframes moneyFloat {

    from {

        transform:
            translateY(-5px)
            scale(1);

    }

    to {

        transform:
            translateY(5px)
            scale(1.07);

    }

}


/* BONUS */

.bonus {

    position: absolute;

    left: 100%;

    width: 58px;

    height: 58px;

    display: flex;

    align-items: center;
    justify-content: center;

    font-size: 44px;

    z-index: 4;

    animation:

        bonusFloat
        1s
        ease-in-out
        infinite
        alternate;

    filter:

        drop-shadow(
            0 4px 4px
            rgba(
                0,
                0,
                0,
                .25
            )
        );

}

@keyframes bonusFloat {

    from {

        transform:
            translateY(-6px)
            rotate(-5deg);

    }

    to {

        transform:
            translateY(6px)
            rotate(5deg);

    }

}


/* CRASH */

.crash-fall {

    animation:

        crashFall
        .65s
        ease-in
        forwards !important;

}

@keyframes crashFall {

    0% {

        transform:
            translateY(0)
            rotate(0);

    }

    25% {

        transform:
            translateY(-25px)
            rotate(-18deg);

    }

    100% {

        transform:
            translateY(450px)
            rotate(180deg);

        opacity: 0;

    }

}


/* MODE MESSAGE */

.mode-message {

    position: absolute;

    top: 42%;

    left: 50%;

    transform:

        translate(
            -50%,
            -50%
        )
        scale(.5);

    z-index: 20;

    width: 100%;

    text-align: center;

    font-weight: 900;

    font-size:
        clamp(
            24px,
            7vw,
            42px
        );

    letter-spacing: 2px;

    opacity: 0;

    pointer-events: none;

}

.mode-message.show {

    animation:

        modeMessage
        2.2s
        ease
        forwards;

}

.night-message {

    color: #fff;

}

.demon-message {

    color: #ff3030;

    text-shadow:

        0 0 8px #ff0000,

        0 0 25px #ff0000,

        3px 3px 0 #000;

}

@keyframes modeMessage {

    0% {

        opacity: 0;

        transform:

            translate(
                -50%,
                -50%
            )
            scale(.5);

    }

    20% {

        opacity: 1;

        transform:

            translate(
                -50%,
                -50%
            )
            scale(1.1);

    }

    35% {

        transform:

            translate(
                -50%,
                -50%
            )
            scale(1);

    }

    75% {

        opacity: 1;

    }

    100% {

        opacity: 0;

        transform:

            translate(
                -50%,
                -50%
            )
            scale(1.15);

    }

}


/* START / GAME OVER */

.start-screen,
.game-over {

    position: absolute;

    inset: 0;

    z-index: 10;

    display: flex;

    flex-direction: column;

    justify-content: center;
    align-items: center;

    padding: 20px;

    background:

        rgba(
            255,
            255,
            255,
            .88
        );

    text-align: center;

}

.game-area.night .start-screen,
.game-area.night .game-over {

    background:

        rgba(
            20,
            30,
            50,
            .88
        );

    color: white;

}

.game-area.demon .start-screen,
.game-area.demon .game-over {

    background:

        rgba(
            20,
            0,
            5,
            .9
        );

    color: white;

}

.start-screen h2,
.game-over h2 {

    margin:
        0 0 10px;

    font-size: 22px;

}

.start-screen p,
.game-over p {

    margin:
        0 0 18px;

    color: #666;

}

.game-area.night .start-screen p,
.game-area.night .game-over p,
.game-area.demon .start-screen p,
.game-area.demon .game-over p {

    color: #bbb;

}

button {

    border: none;

    padding:
        12px 22px;

    border-radius: 12px;

    background: #222;

    color: white;

    font-size: 16px;

    cursor: pointer;

    touch-action: manipulation;

}

button:disabled {

    opacity: .5;

    cursor: default;

}

.hidden {

    display: none;

}


/* HINT */

.hint {

    min-height: 25px;

    display: flex;

    justify-content: center;
    align-items: center;

    color: #888;

    font-size: 12px;

    flex-shrink: 0;

}

@media (max-height: 600px) {

    .header {

        min-height: 36px;

        font-size: 15px;

    }

    .score {

        font-size: 14px;

    }

    .exit-button {

        padding:
            5px 8px;

        font-size: 12px;

    }

    .hint {

        display: none;

    }

    .ground {

        height: 55px;

    }

    .cat,
    .expense {

        bottom: 55px;

    }

}


/* LOADING */

.loading-screen {

    position: absolute;

    inset: 0;

    z-index: 100;

    display: flex;

    flex-direction: column;

    justify-content: center;
    align-items: center;

    gap: 12px;

    background:
        rgba(
            255,
            255,
            255,
            .96
        );

    color: #333;

    font-size: 16px;

}

.loading-cat {

    font-size: 42px;

    animation:

        loadingBounce
        .8s
        ease-in-out
        infinite
        alternate;

}

@keyframes loadingBounce {

    from {

        transform:
            translateY(0);

    }

    to {

        transform:
            translateY(-10px);

    }

}

.loading-screen.hidden {

    display: none;

}

</style>
</head>

<body>

<div class="game">

    <div class="header">

        <div class="title">

            🐱 Котик против расходов

        </div>

        <div class="header-right">

            <div class="score">

                Счёт:

                <span id="score">

                    0

                </span>

            </div>

            <button
                class="exit-button"
                id="exitButton">

                ← В меню

            </button>

        </div>

    </div>


    <div
        class="game-area"
        id="gameArea">


        <div
            class="loading-screen"
            id="loadingScreen">

            <div
                class="loading-cat">

                🐱

            </div>

            <div>

                Загружаем котика...

            </div>

        </div>


        <div
            class="active-bonuses"
            id="activeBonuses">

        </div>


        <div class="sky">

            <div class="cloud cloud-1">

                ☁️

            </div>

            <div class="cloud cloud-2">

                ☁️

            </div>

            <div class="cloud cloud-3">

                ☁️

            </div>

            <div class="background-hill"></div>

            <div
                class="moon"
                id="moon">

                🌙

            </div>

            <div class="demon-sky"></div>

        </div>


        <div
            class="mode-message"
            id="modeMessage">

        </div>


        <div
            class="start-screen"
            id="startScreen">

            <h2>

                🐱 Спаси котика от расходов!

            </h2>

            <p>

                Собирай деньги. Избегай трат.

            </p>

            <button
                id="startButton"
                disabled>

                Загрузка...

            </button>

        </div>


        <div
            class="game-over hidden"
            id="gameOver">

            <h2>

                😿 Котик потратился

            </h2>

            <p>

                Твой счёт:

                <b id="finalScore">

                    0

                </b>

            </p>

            <button
                id="restartButton">

                Играть ещё

            </button>

        </div>


        <div
            class="cat"
            id="cat">

            <div
                class="cat-item cat-shield"
                id="catShield">

                🛡️

            </div>

            <div
                class="cat-item cat-magnet"
                id="catMagnet">

                🧲

            </div>

        </div>


        <div class="ground">

            <div class="ground-lines"></div>

        </div>

    </div>


    <div class="hint">

        Тапни по экрану или нажми пробел,
        чтобы прыгнуть 🐾

    </div>

</div>


<script>


/* DOM */

const gameArea =
    document.getElementById(
        "gameArea"
    );

const cat =
    document.getElementById(
        "cat"
    );

const catShield =
    document.getElementById(
        "catShield"
    );

const catMagnet =
    document.getElementById(
        "catMagnet"
    );

const startScreen =
    document.getElementById(
        "startScreen"
    );

const gameOverScreen =
    document.getElementById(
        "gameOver"
    );

const startButton =
    document.getElementById(
        "startButton"
    );

const restartButton =
    document.getElementById(
        "restartButton"
    );

const exitButton =
    document.getElementById(
        "exitButton"
    );

const scoreElement =
    document.getElementById(
        "score"
    );

const finalScoreElement =
    document.getElementById(
        "finalScore"
    );

const moon =
    document.getElementById(
        "moon"
    );

const modeMessage =
    document.getElementById(
        "modeMessage"
    );

const activeBonuses =
    document.getElementById(
        "activeBonuses"
    );

const loadingScreen =
    document.getElementById(
        "loadingScreen"
    );


/* SPRITES */

const SPRITES = {

    run:
        "cat_run.png",

    jump:
        "cat_jump.png",

    roll:
        "cat_roll.png"

};


const loadedSprites = {};

let spritesReady =
    false;


function preloadImage(src) {

    return new Promise(
        (
            resolve,
            reject
        ) => {

            const image =
                new Image();

            image.onload =
                () => {

                    loadedSprites[src] =
                        image;

                    resolve(image);

                };

            image.onerror =
                () => {

                    reject(
                        new Error(
                            "Не удалось загрузить " +
                            src
                        )
                    );

                };

            image.src =
                src;

        }
    );

}


async function preloadSprites() {

    try {

        await Promise.all([

            preloadImage(
                SPRITES.run
            ),

            preloadImage(
                SPRITES.jump
            ),

            preloadImage(
                SPRITES.roll
            )

        ]);

        spritesReady =
            true;

function setSpriteFrame(
    image,
    frame
) {

    if (
        !spritesReady &&
        !loadedSprites[image]
    ) {

        return;

    }

    frame =
        Math.max(
            0,
            Math.min(
                SPRITE_FRAMES - 1,

            )
        );


    cat.style.backgroundImage =
        `url("${image}")`;


    cat.style.backgroundSize =

    const position =

        frame === 0

            ? 0

            :

        (
            frame /
            (
                SPRITE_FRAMES - 1
            )
        ) *
        100;


    cat.style.backgroundPosition =

        `${position}% 0%`;

}

function updateInertialPosition(

    position,

    target,

    deltaTime,

    extraX = 0,

    extraY = 0

) {

    const deltaSeconds =

        Math.min(
            deltaTime / 1000,
            .05
        );


    const stiffness =
        5.8;

    const damping =
        4.4;


    const forceX =

        (
            target.x +
            extraX -
            position.x
        ) *
        stiffness;


    const forceY =

        (
            target.y +
            extraY -
            position.y
        ) *
        stiffness;


    position.velocityX +=

        forceX *
        deltaSeconds;


    position.velocityY +=

        forceY *
        deltaSeconds;


    const dampingFactor =

        Math.exp(
            -damping *
            deltaSeconds
        );


    position.velocityX *=
        dampingFactor;

    position.velocityY *=
        dampingFactor;


    position.x +=

        position.velocityX *
        deltaSeconds;


    position.y +=

        position.velocityY *
        deltaSeconds;

}

    updateInertialPosition(

        ) *

    const shieldRotate =

    ) {

        const currentFrame =

            Number(
                cat.dataset.frame ||

        const nextFrame =

            (

            %
            SPRITE_FRAMES;


        cat.dataset.frame =
            nextFrame;


        setSpriteFrame(

            SPRITES.run,

            nextFrame

        );

    }

}

    deltaTime
) {

    rollFrameTimer +=
        deltaTime;


    if (

        rollFrameTimer >=
        rollFrameDuration

    ) {

        rollFrameTimer =

        rollFrame++;

            rollFrame >=

function jump() {

        rolling

    isJumping =

/* JUMP UPDATE */

function updateJump(
    currentTime
) {

    if (
        !isJumping
    ) {

        return 0;

    }


    const elapsed =

        currentTime -
        jumpStartTime;


    const progress =

        elapsed /
        jumpDuration;


    if (
        progress >= 1
    ) {

        isJumping =
            false;


        jumpStartTime =
            null;


        cat.dataset.frame =
            "0";


        setSpriteFrame(

            SPRITES.run,

            0

        );


        runFrameTimer =
            0;


        return 0;

    }


    let jumpFrame =
        0;


    if (
        elapsed < 90
    ) {

        jumpFrame =
            0;

    }

    else if (
        elapsed < 310
    ) {

        jumpFrame =
            1;

    }

    else if (
        elapsed < 670
    ) {

        jumpFrame =
            2;

    }

    else {

        jumpFrame =
            3;

    }


    cat.dataset.frame =
        jumpFrame;


    setSpriteFrame(

        SPRITES.jump,

        jumpFrame

    );


    return Math.sin(

        Math.PI *
        progress

    ) *
    jumpHeight;

}

/* COLLISIONS */

function checkObstacleCollision(
    obstacle
) {

    const catRect =
        cat.getBoundingClientRect();


    const obstacleRect =
        obstacle.element
            .getBoundingClientRect();


    const horizontal =

        catRect.right >

            obstacleRect.left +
            12

        &&

        catRect.left <

            obstacleRect.right -
            12;


    const vertical =

        catRect.bottom >

            obstacleRect.top +
            10;


    return (

        horizontal &&
        vertical

    );

}


function checkCoinCollision(
    coin
) {

    const catRect =
        cat.getBoundingClientRect();


    const coinRect =
        coin.element
            .getBoundingClientRect();


    return (

        catRect.right >
            coinRect.left &&

        catRect.left <
            coinRect.right &&

        catRect.bottom >
            coinRect.top &&

        catRect.top <
            coinRect.bottom

    );

}


function checkBonusCollision(
    bonus
) {

    const catRect =
        cat.getBoundingClientRect();


    const bonusRect =
        bonus.element
            .getBoundingClientRect();


    return (

        catRect.right >
            bonusRect.left &&

        catRect.left <
            bonusRect.right &&

        catRect.bottom >
            bonusRect.top &&

        catRect.top <
            bonusRect.bottom

    );

}

/* MAGNET */

function applyMagnetForce(
    coin,
    deltaTime
) {

    const catRect =
        cat.getBoundingClientRect();


    const coinRect =
        coin.element
            .getBoundingClientRect();


    const catCenterX =

        catRect.left +
        catRect.width /
        2;


    const catCenterY =

        catRect.top +
        catRect.height /
        2;


    const coinCenterX =

        coinRect.left +
        coinRect.width /
        2;


    const coinCenterY =

        coinRect.top +
        coinRect.height /
        2;


    const dx =

        catCenterX -
        coinCenterX;


    const dy =

        catCenterY -
        coinCenterY;


    const distance =

        Math.sqrt(

            dx * dx +
            dy * dy

        );


    if (

        distance >
        MAGNET_RADIUS

    ) {

        coin.element.classList.remove(
            "magnet-active"
        );


        return;

    }


    coin.element.classList.add(
        "magnet-active"
    );


    const deltaSeconds =

        Math.min(

            deltaTime /
            1000,

            .05

        );


    const factor =

        1 -

        Math.exp(

            -MAGNET_PULL_SPEED *
            deltaSeconds

        );


    coin.x +=
        dx *
        factor;


    coin.y -=
        dy *
        factor;

}


/* GAME LOOP */

function gameLoop(
    currentTime
) {

    if (

        !gameStarted ||
        gameOver

    ) {

        return;

    }


    const deltaTime =

        currentTime -
        lastTime;


    lastTime =
        currentTime;


    const catY =
        updateJump(
            currentTime
        );


    catMotion.y =

        catY -
        catMotion.previousJumpY;


    catMotion.previousJumpY =
        catY;


    updateRunAnimation(
        deltaTime
    );


    updateRollAnimation(
        deltaTime
    );


    cat.style.transform =

        `translateY(
            ${-catY}px
        )`;


    updateCatItems(
        deltaTime
    );


    let speed =

        (

            .20 +

            Math.min(

                score *
                .001,

                .10

            )

        ) *

        deltaTime;


    if (
        salaryActive
    ) {

        speed *=
            .55;

    }


    /* TIMERS */

    if (
        magnetActive
    ) {

        magnetTimer -=
            deltaTime;


        if (
            magnetTimer <=
            0
        ) {

            magnetActive =
                false;


            removeItemFromOrder(
                "magnet"
            );


            updateBonusUI();

        }

    }


    if (
        salaryActive
    ) {

        salaryTimer -=
            deltaTime;


        if (
            salaryTimer <=
            0
        ) {

            salaryActive =
                false;


            updateBonusUI();

        }

    }


    updateBonusUIState();


    /* OBSTACLES */

    obstacles.forEach(

        obstacle => {

            obstacle.x -=
                speed;


            obstacle.element.style.left =
                obstacle.x +
                "px";


            if (

                !crashInProgress &&

                checkObstacleCollision(
                    obstacle
                )

            ) {

                if (
                    shieldActive
                ) {

                    shieldCrash(
                        obstacle
                    );

                }

                else {

                    endGame();

                }

            }

        }

    );


    /* COINS */

    coins.forEach(

        coin => {

            coin.x -=
                speed;


            if (
                magnetActive
            ) {

                applyMagnetForce(

                    coin,

                    deltaTime

                );

            }


            coin.element.style.left =
                coin.x +
                "px";


            coin.element.style.bottom =
                coin.y +
                "px";


            if (

                !coin.collected &&

                checkCoinCollision(
                    coin
                )

            ) {

                coin.collected =
                    true;


                score +=

                    salaryActive

                        ? 20

                        : 10;


                scoreElement.textContent =
                    score;


                checkMode();


                coin.element.remove();

            }

        }

    );


    /* BONUSES */

    bonuses.forEach(

        bonus => {

            bonus.x -=
                speed;


            bonus.element.style.left =
                bonus.x +
                "px";


            if (

                !bonus.collected &&

                checkBonusCollision(
                    bonus
                )

            ) {

                bonus.collected =
                    true;


                activateBonus(
                    bonus.type
                );


                bonus.element.remove();

            }

        }

    );


    /* REMOVE */

    obstacles =
        obstacles.filter(

            obstacle => {

                if (

                    obstacle.x <
                    -160

                ) {

                    obstacle.element.remove();


                    if (

                        lastObstacle ===
                        obstacle

                    ) {

                        lastObstacle =
                            null;

                    }


                    return false;

                }


                return true;

            }

        );


    coins =
        coins.filter(

            coin => {

                if (

                    coin.collected ||

                    coin.x <
                    -100

                ) {

                    if (

                        coin.element
                            .parentElement

                    ) {

                        coin.element.remove();

                    }


                    return false;

                }


                return true;

            }

        );


    bonuses =
        bonuses.filter(

            bonus => {

                if (

                    bonus.collected ||

                    bonus.x <
                    -100

                ) {

                    if (

                        bonus.element
                            .parentElement

                    ) {

                        bonus.element.remove();

                    }


                    return false;

                }


                return true;

            }

        );


    /* SPAWN EXPENSE */

    obstacleTimer +=
        deltaTime;


    if (

        obstacleTimer >=
        nextObstacleTime &&

        canCreateObstacle()

    ) {

        createExpense();


        obstacleTimer =
            0;


        nextObstacleTime =

            1300 +

            Math.random() *
            1800;

    }


    /* SPAWN COIN */

    coinTimer +=
        deltaTime;


    if (

        coinTimer >=
        nextCoinTime

    ) {

        createCoin();


        coinTimer =
            0;


        nextCoinTime =

            900 +

            Math.random() *
            2400;

    }


    /* SPAWN BONUS */

    bonusTimer +=
        deltaTime;


    if (

        bonusTimer >=
        nextBonusTime

    ) {

        createBonus();


        bonusTimer =
            0;


        nextBonusTime =

            7000 +

            Math.random() *
            9000;

    }


    /* SCORE */

    scoreTimer +=
        deltaTime;


    if (

        scoreTimer >=
        1000

    ) {

        score +=

            salaryActive

                ? 2

                : 1;


        scoreElement.textContent =
            score;


        scoreTimer =
            0;


        checkMode();

    }


    requestAnimationFrame(
        gameLoop
    );

}


/* START */

function startGame() {

    if (
        !spritesReady
    ) {

        return;

    }


    score =
        0;


    gameStarted =
        true;


    gameOver =
        false;


    isJumping =
        false;


    jumpStartTime =
        null;


    lastObstacle =
        null;


    nightMode =
        false;


    demonMode =
        false;


    shieldActive =
        false;


    magnetActive =
        false;


    salaryActive =
        false;


    magnetTimer =
        0;


    salaryTimer =
        0;


    crashInProgress =
        false;


    rolling =
        false;


    runFrameTimer =
        0;


    rollFrameTimer =
        0;


    rollFrame =
        0;


    itemOrder =
        [];


    shieldItemPosition = {

        x:
            ITEM_SLOTS.near.x,

        y:
            ITEM_SLOTS.near.y,

        velocityX:
            0,

        velocityY:
            0

    };


    magnetItemPosition = {

        x:
            ITEM_SLOTS.far.x,

        y:
            ITEM_SLOTS.far.y,

        velocityX:
            0,

        velocityY:
            0

    };


    catMotion = {

        x: 0,

        y: 0,

        previousY: 0,

        previousJumpY: 0

    };


    gameArea.classList.remove(

        "night",

        "demon"

    );


    moon.classList.remove(

        "enter",

        "leave"

    );


    moon.style.opacity =
        "0";


    activeBonuses.innerHTML =
        "";


    scoreElement.textContent =
        "0";


    cat.style.transform =
        "translateY(0)";


    cat.dataset.frame =
        "0";


    setSpriteFrame(

        SPRITES.run,

        0

    );


    updateCatItems();


    startScreen.classList.add(
        "hidden"
    );


    gameOverScreen.classList.add(
        "hidden"
    );


    obstacles.forEach(

        obstacle => {

            obstacle.element.remove();

        }

    );


    coins.forEach(

        coin => {

            coin.element.remove();

        }

    );


    bonuses.forEach(

        bonus => {

            bonus.element.remove();

        }

    );


    obstacles =
        [];


    coins =
        [];


    bonuses =
        [];


    obstacleTimer =
        0;


    coinTimer =
        0;


    bonusTimer =
        0;


    scoreTimer =
        0;


    nextObstacleTime =
        1600;


    nextCoinTime =
        1200;


    nextBonusTime =
        8000;


    lastTime =
        performance.now();


    requestAnimationFrame(
        gameLoop
    );

}


/* BUTTONS */

startButton.addEventListener(

    "click",

    event => {

        event.preventDefault();

        event.stopPropagation();


        startGame();

    }

);


restartButton.addEventListener(

    "click",

    event => {

        event.preventDefault();

        event.stopPropagation();


        startGame();

    }

);


/* TOUCH / MOUSE */

gameArea.addEventListener(

    "pointerdown",

    event => {

        event.preventDefault();


        if (

            event.target ===
            startButton ||

            event.target ===
            restartButton

        ) {

            return;

        }


        jump();

    },

    {

        passive:
            false

    }

);


/* KEYBOARD */

document.addEventListener(

    "keydown",

    event => {

        if (

            event.code ===
            "Space"

        ) {

            event.preventDefault();


            jump();

        }

    }

);
