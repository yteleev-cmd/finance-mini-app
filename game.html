<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Котик против расходов</title>

<style>

* {
    box-sizing: border-box;
}

html,
body {

    margin: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    font-family: Arial, sans-serif;

    background: #f4f5f7;

}

body {

    display: flex;

    justify-content: center;
    align-items: center;

    padding: 8px;

}

.game {

    width: min(100%, 520px);

    height: min(calc(100svh - 16px), 850px);

    display: flex;

    flex-direction: column;

}

/* HEADER */

.header {

    min-height: 44px;

    display: flex;

    align-items: center;

    justify-content: space-between;

    gap: 8px;

    padding: 0 4px;

    font-size: 17px;

    font-weight: bold;

    flex-shrink: 0;

}

.title {

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

}

.header-right {

    display: flex;

    align-items: center;

    gap: 8px;

    flex-shrink: 0;

}

.score {

    color: #555;

    font-size: 16px;

    white-space: nowrap;

}

.exit-button {

    border: 1px solid #dcdfe3;

    padding: 7px 10px;

    border-radius: 10px;

    background: #fff;

    color: #555;

    font-size: 13px;

    cursor: pointer;

}

/* GAME AREA */

.game-area {

    position: relative;

    flex: 1;

    min-height: 0;

    overflow: hidden;

    border-radius: 20px;

    background: linear-gradient(#dff3ff, #ffffff);

    border: 2px solid #e5e7eb;

    cursor: pointer;

    user-select: none;

    touch-action: manipulation;

    transition:

        background 1.5s ease,

        border-color 1.5s ease;

}

.game-area.night {

    background: linear-gradient(#17233d, #344766);

    border-color: #263653;

}

.game-area.demon {

    background:

        radial-gradient(

            circle at 50% 20%,

            #5e1717,

            #230b12 45%,

            #080509 100%

        );

    border-color: #4b171d;

}

/* ACTIVE BONUSES */

.active-bonuses {

    position: absolute;

    top: 12px;

    left: 12px;

    z-index: 50;

    display: flex;

    flex-direction: column;

    gap: 6px;

    pointer-events: none;

}

.active-bonus {

    min-width: 46px;

    height: 42px;

    padding: 0 8px;

    display: flex;

    align-items: center;

    justify-content: center;

    gap: 4px;

    border-radius: 12px;

    background: rgba(255,255,255,.9);

    box-shadow: 0 3px 10px rgba(0,0,0,.18);

    font-size: 25px;

    backdrop-filter: blur(4px);

}

.game-area.night .active-bonus {

    background: rgba(20,30,50,.9);

}

.game-area.demon .active-bonus {

    background: rgba(40,0,5,.9);

}

.active-bonus span {

    font-size: 12px;

    font-weight: bold;

}

.active-bonus.expiring {

    animation: bonusBlink .45s infinite alternate;

}

@keyframes bonusBlink {

    from {

        opacity: 1;
        transform: scale(1);

    }

    to {

        opacity: .25;
        transform: scale(1.08);

    }

}

/* SKY */

.sky {

    position: absolute;

    inset: 0;

    overflow: hidden;

    pointer-events: none;

    z-index: 0;

}

.cloud {

    display: none;

}

.background-hill {

    position: absolute;

    bottom: 65px;

    left: 0;

    width: 200%;

    height: 100px;

    opacity: .35;

    background:

        radial-gradient(

            ellipse at 20% 100%,

            #a8d69b 0 45%,

            transparent 46%

        ),

        radial-gradient(

            ellipse at 55% 100%,

            #a8d69b 0 50%,

            transparent 51%

        ),

        radial-gradient(

            ellipse at 85% 100%,

            #a8d69b 0 45%,

            transparent 46%

        );

    background-size: 400px 100px;

    animation: hillsMove 16s linear infinite;

    pointer-events: none;

}

.game-area.night .background-hill {

    opacity: .12;

    filter: brightness(.45);

}

.game-area.demon .background-hill {

    opacity: .22;

    filter: hue-rotate(280deg) brightness(.35);

}

@keyframes hillsMove {

    from {

        transform: translateX(0);

    }

    to {

        transform: translateX(-400px);

    }

}

/* MOON */

.moon {

    position: absolute;

    left: 75%;

    top: 18%;

    font-size: 54px;

    opacity: 0;

    z-index: 1;

    pointer-events: none;

}

.game-area.night .moon {

    animation: moonSlowMove 35s linear infinite;

}

@keyframes moonSlowMove {

    from {

        transform: translateX(0);

    }

    to {

        transform: translateX(-280px);

    }

}

.moon.enter {

    animation:

        moonEnter 1.1s cubic-bezier(.2,.8,.3,1) forwards !important;

}

@keyframes moonEnter {

    0% {

        opacity: 0;

        transform:

            translate(180px, 300px)

            scale(.4);

    }

    55% {

        opacity: 1;

    }

    100% {

        opacity: 1;

        transform:

            translate(0, 0)

            scale(1);

    }

}

.moon.leave {

    animation:

        moonLeave 1.1s cubic-bezier(.6,.1,.8,.2) forwards !important;

}

@keyframes moonLeave {

    0% {

        opacity: 1;

        transform: translate(0, 0);

    }

    100% {

        opacity: 0;

        transform:

            translate(-400px, 250px)

            rotate(-30deg);

    }

}

/* DEMON SKY */

.demon-sky {

    position: absolute;

    inset: 0;

    opacity: 0;

    pointer-events: none;

    background:

        repeating-linear-gradient(

            135deg,

            transparent 0 20px,

            rgba(255, 0, 0, .04) 21px 22px

        );

}

.game-area.demon .demon-sky {

    opacity: 1;

}

/* GROUND */

.ground {

    position: absolute;

    bottom: 0;

    left: 0;

    width: 100%;

    height: 65px;

    background: #b9df9d;

    border-top: 4px solid #8fc276;

    overflow: hidden;

    z-index: 2;

    transition:

        background 1s ease,

        border-color 1s ease;

}

.game-area.night .ground {

    background: #29452d;

    border-color: #1d3020;

}

.game-area.demon .ground {

    background: #280d13;

    border-color: #5e151d;

}

.ground-lines {

    position: absolute;

    top: 18px;

    left: 0;

    width: 200%;

    height: 6px;

    background:

        repeating-linear-gradient(

            90deg,

            transparent 0,

            transparent 35px,

            rgba(92,150,76,.25) 35px,

            rgba(92,150,76,.25) 75px,

            transparent 75px,

            transparent 120px

        );

    animation: groundMove 1.2s linear infinite;

}

.game-area.demon .ground-lines {

    background:

        repeating-linear-gradient(

            90deg,

            transparent 0,

            transparent 35px,

            rgba(255,50,50,.35) 35px,

            rgba(255,50,50,.35) 75px,

            transparent 75px,

            transparent 120px

        );

}

@keyframes groundMove {

    from {

        transform: translateX(0);

    }

    to {

        transform: translateX(-120px);

    }

}

/* CAT */

.cat {

    position: absolute;

    left: clamp(42px, 14vw, 70px);

    bottom: 65px;

    width: clamp(50px, 14vw, 62px);

    height: clamp(50px, 14vw, 62px);

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: clamp(44px, 13vw, 54px);

    z-index: 5;

    will-change: transform;

}

/* EXPENSES */

.expense {

    position: absolute;

    left: 100%;

    bottom: 65px;

    display: flex;

    align-items: center;

    justify-content: center;

    line-height: 1;

    white-space: nowrap;

    z-index: 4;

    filter:

        drop-shadow(

            0 4px 2px rgba(0,0,0,.15)

        );

}

.expense.small {

    font-size: clamp(42px, 13vw, 48px);

}

.expense.normal {

    font-size: clamp(52px, 16vw, 62px);

}

.expense.wide {

    font-size: clamp(65px, 20vw, 78px);

}

/* COINS */

.coin {

    position: absolute;

    left: 100%;

    width: 52px;

    height: 52px;

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: clamp(38px, 12vw, 46px);

    z-index: 3;

    filter:

        drop-shadow(

            0 4px 2px rgba(0,0,0,.15)

        );

    will-change: left, bottom;

    animation:

        moneyFloat 1.2s ease-in-out infinite alternate;

}

/*

    Во время работы магнита убираем

    визуальное покачивание.

    Так движение к котику не смешивается

    с transform-анимацией.

*/

.coin.magnet-active {

    animation: none;

}

@keyframes moneyFloat {

    from {

        transform:

            translateY(-5px)

            scale(1);

    }

    to {

        transform:

            translateY(5px)

            scale(1.07);

    }

}

/* BONUS */

.bonus {

    position: absolute;

    left: 100%;

    width: 58px;

    height: 58px;

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: 44px;

    z-index: 4;

    animation:

        bonusFloat 1s ease-in-out infinite alternate;

    filter:

        drop-shadow(

            0 4px 4px rgba(0,0,0,.25)

        );

}

@keyframes bonusFloat {

    from {

        transform:

            translateY(-6px)

            rotate(-5deg);

    }

    to {

        transform:

            translateY(6px)

            rotate(5deg);

    }

}

/* CRASH */

.crash-fall {

    animation:

        crashFall .65s ease-in forwards !important;

}

@keyframes crashFall {

    0% {

        transform:

            translateY(0)

            rotate(0);

    }

    25% {

        transform:

            translateY(-25px)

            rotate(-18deg);

    }

    100% {

        transform:

            translateY(450px)

            rotate(180deg);

        opacity: 0;

    }

}

.cat-hit {

    animation:

        catHit .35s ease-out;

}

@keyframes catHit {

    0% {

        transform: translateX(0);

    }

    40% {

        transform:

            translateX(18px)

            rotate(8deg);

    }

    100% {

        transform: translateX(0);

    }

}

/* MODE MESSAGE */

.mode-message {

    position: absolute;

    top: 42%;

    left: 50%;

    transform:

        translate(-50%, -50%)

        scale(.5);

    z-index: 20;

    width: 100%;

    text-align: center;

    font-weight: 900;

    font-size: clamp(24px, 7vw, 42px);

    letter-spacing: 2px;

    opacity: 0;

    pointer-events: none;

}

.mode-message.show {

    animation:

        modeMessage 2.2s ease forwards;

}

.night-message {

    color: #fff;

}

.demon-message {

    color: #ff3030;

    text-shadow:

        0 0 8px #ff0000,

        0 0 25px #ff0000,

        3px 3px 0 #000;

}

@keyframes modeMessage {

    0% {

        opacity: 0;

        transform:

            translate(-50%, -50%)

            scale(.5);

    }

    20% {

        opacity: 1;

        transform:

            translate(-50%, -50%)

            scale(1.1);

    }

    35% {

        transform:

            translate(-50%, -50%)

            scale(1);

    }

    75% {

        opacity: 1;

    }

    100% {

        opacity: 0;

        transform:

            translate(-50%, -50%)

            scale(1.15);

    }

}

/* START / GAME OVER */

.start-screen,
.game-over {

    position: absolute;

    inset: 0;

    z-index: 10;

    display: flex;

    flex-direction: column;

    justify-content: center;

    align-items: center;

    padding: 20px;

    background: rgba(255,255,255,.88);

    text-align: center;

}

.game-area.night .start-screen,
.game-area.night .game-over {

    background: rgba(20,30,50,.88);

    color: white;

}

.game-area.demon .start-screen,
.game-area.demon .game-over {

    background: rgba(20,0,5,.9);

    color: white;

}

.start-screen h2,
.game-over h2 {

    margin: 0 0 10px;

    font-size: 22px;

}

.start-screen p,
.game-over p {

    margin: 0 0 18px;

    color: #666;

}

.game-area.night .start-screen p,
.game-area.night .game-over p,
.game-area.demon .start-screen p,
.game-area.demon .game-over p {

    color: #bbb;

}

button {

    border: none;

    padding: 12px 22px;

    border-radius: 12px;

    background: #222;

    color: white;

    font-size: 16px;

    cursor: pointer;

}

button:active {

    transform: scale(.97);

}

.hidden {

    display: none;

}

/* HINT */

.hint {

    min-height: 25px;

    display: flex;

    justify-content: center;

    align-items: center;

    color: #888;

    font-size: 12px;

    flex-shrink: 0;

}

@media (max-height: 600px) {

    .header {

        min-height: 36px;

        font-size: 15px;

    }

    .score {

        font-size: 14px;

    }

    .exit-button {

        padding: 5px 8px;

        font-size: 12px;

    }

    .hint {

        display: none;

    }

    .ground {

        height: 55px;

    }

    .cat,
    .expense {

        bottom: 55px;

    }

}

</style>

</head>

<body>

<div class="game">

<div class="header">

<div class="title">

🐱 Котик против расходов

</div>

<div class="header-right">

<div class="score">

Счёт:

<span id="score">0</span>

</div>

<button
class="exit-button"
id="exitButton">

← В меню

</button>

</div>

</div>

<div
class="game-area"
id="gameArea">

<div class="active-bonuses"
id="activeBonuses"></div>

<div class="sky">

<div class="cloud">☁️</div>

<div class="cloud">☁️</div>

<div class="cloud">☁️</div>

<div class="background-hill"></div>

<div
class="moon"
id="moon">

🌙

</div>

<div class="demon-sky"></div>

</div>

<div
class="mode-message"
id="modeMessage">

</div>

<div
class="start-screen"
id="startScreen">

<h2>

🐱 Спаси котика от расходов!

</h2>

<p>

Собирай деньги. Избегай трат.

</p>

<button id="startButton">

Начать игру

</button>

</div>

<div
class="game-over hidden"
id="gameOver">

<h2>

😿 Котик потратился

</h2>

<p>

Твой счёт:

<b id="finalScore">0</b>

</p>

<button id="restartButton">

Играть ещё

</button>

</div>

<div
class="cat"
id="cat">

🐱

</div>

<div class="ground">

<div class="ground-lines"></div>

</div>

</div>

<div class="hint">

Тапни по экрану или нажми пробел, чтобы прыгнуть 🐾

</div>

</div>

<script>

const gameArea =
document.getElementById("gameArea");

const cat =
document.getElementById("cat");

const startScreen =
document.getElementById("startScreen");

const gameOverScreen =
document.getElementById("gameOver");

const startButton =
document.getElementById("startButton");

const restartButton =
document.getElementById("restartButton");

const exitButton =
document.getElementById("exitButton");

const scoreElement =
document.getElementById("score");

const finalScoreElement =
document.getElementById("finalScore");

const moon =
document.getElementById("moon");

const modeMessage =
document.getElementById("modeMessage");

const activeBonuses =
document.getElementById("activeBonuses");

let gameStarted = false;

let gameOver = false;

let score = 0;

let obstacles = [];

let coins = [];

let bonuses = [];

let isJumping = false;

let jumpStartTime = null;

let lastTime = 0;

let obstacleTimer = 0;

let coinTimer = 0;

let bonusTimer = 0;

let scoreTimer = 0;

let nextObstacleTime = 1600;

let nextCoinTime = 1200;

let nextBonusTime = 8000;

let lastObstacle = null;

let nightMode = false;

let demonMode = false;

let shieldActive = false;

let magnetActive = false;

let salaryActive = false;

let magnetTimer = 0;

let salaryTimer = 0;

let crashInProgress = false;

const jumpDuration = 1800;

const jumpHeight = 155;

const MAGNET_DURATION = 20000;

/*

    Настройки нового магнита.

    Магнит действует на достаточно большом

    расстоянии и плавно приближает монетку

    к котику без перелётов.

*/

const MAGNET_RADIUS = 260;

const MAGNET_PULL_SPEED = 8;

const normalExpenses = [

    "🛒",

    "🍔",

    "🚕",

    "🧾",

    "📦",

    "🛍️"

];

const demonExpenses = [

    "👹",

    "💀",

    "🔥",

    "☠️",

    "👿",

    "🩸"

];

const normalMoney = [

    "🪙",

    "💵",

    "💰",

    "💸"

];

const demonMoney = [

    "✨",

    "🌟",

    "🪽",

    "✝️"

];

const normalBonuses = [

    "🧲",

    "🛡️",

    "⚡"

];

const demonBonuses = [

    "🧲",

    "🛡️",

    "⚡"

];

/* BONUS UI */

function updateBonusUI() {

    activeBonuses.innerHTML = "";

    if (magnetActive) {

        const item =
            document.createElement("div");

        item.className =
            "active-bonus";

        item.id =
            "activeMagnet";

        item.innerHTML =
            "🧲 <span></span>";

        activeBonuses.appendChild(item);

    }

    if (shieldActive) {

        const item =
            document.createElement("div");

        item.className =
            "active-bonus";

        item.id =
            "activeShield";

        item.innerHTML =
            "🛡️";

        activeBonuses.appendChild(item);

    }

    if (salaryActive) {

        const item =
            document.createElement("div");

        item.className =
            "active-bonus";

        item.id =
            "activeSalary";

        item.innerHTML =
            "⚡ <span></span>";

        activeBonuses.appendChild(item);

    }

}

function updateBonusUIState() {

    const magnetUI =
        document.getElementById("activeMagnet");

    if (magnetUI) {

        const span =
            magnetUI.querySelector("span");

        span.textContent =
            Math.ceil(magnetTimer / 1000) + "с";

        if (magnetTimer <= 3000) {

            magnetUI.classList.add("expiring");

        } else {

            magnetUI.classList.remove("expiring");

        }

    }

    const salaryUI =
        document.getElementById("activeSalary");

    if (salaryUI) {

        const span =
            salaryUI.querySelector("span");

        span.textContent =
            Math.ceil(salaryTimer / 1000) + "с";

        if (salaryTimer <= 3000) {

            salaryUI.classList.add("expiring");

        } else {

            salaryUI.classList.remove("expiring");

        }

    }

}

/* EXIT */

exitButton.addEventListener(

    "click",

    function(event) {

        event.stopPropagation();

        window.location.href =
            "index.html";

    }

);

/* JUMP */

function jump() {

    if (

        !gameStarted ||

        gameOver ||

        isJumping ||

        crashInProgress

    ) {

        return;

    }

    isJumping = true;

    jumpStartTime =
        performance.now();

}

function updateJump(currentTime) {

    if (!isJumping) {

        return 0;

    }

    const elapsed =
        currentTime - jumpStartTime;

    const progress =
        elapsed / jumpDuration;

    if (progress >= 1) {

        isJumping = false;

        jumpStartTime = null;

        return 0;

    }

    return (

        Math.sin(

            Math.PI * progress

        ) * jumpHeight

    );

}

/* OBSTACLE SIZE */

function getRandomObstacleSize() {

    const random =
        Math.random();

    if (random < .35) {

        return "small";

    }

    if (random < .80) {

        return "normal";

    }

    return "wide";

}

/* CREATE EXPENSE */

function createExpense() {

    const expense =
        document.createElement("div");

    const size =
        getRandomObstacleSize();

    expense.className =
        "expense " + size;

    const list =
        demonMode
            ? demonExpenses
            : normalExpenses;

    expense.textContent =

        list[

            Math.floor(

                Math.random() *
                list.length

            )

        ];

    gameArea.appendChild(expense);

    const obstacle = {

        element: expense,

        x: gameArea.offsetWidth,

        size: size

    };

    obstacles.push(obstacle);

    lastObstacle =
        obstacle;

}

/* CREATE MONEY */

function createCoin() {

    const coin =
        document.createElement("div");

    coin.className =
        "coin";

    const list =
        demonMode
            ? demonMoney
            : normalMoney;

    coin.textContent =

        list[

            Math.floor(

                Math.random() *
                list.length

            )

        ];

    const bottom =

        100 +
        Math.random() * 140;

    coin.style.bottom =
        bottom + "px";

    gameArea.appendChild(coin);

    coins.push({

        element: coin,

        x: gameArea.offsetWidth,

        y: bottom,

        collected: false

    });

}

/* CREATE BONUS */

function createBonus() {

    const bonus =
        document.createElement("div");

    bonus.className =
        "bonus";

    const list =
        demonMode
            ? demonBonuses
            : normalBonuses;

    const type =

        list[

            Math.floor(

                Math.random() *
                list.length

            )

        ];

    bonus.textContent =
        type;

    bonus.dataset.type =
        type;

    bonus.style.bottom =

        (

            130 +
            Math.random() * 150

        ) + "px";

    gameArea.appendChild(bonus);

    bonuses.push({

        element: bonus,

        x: gameArea.offsetWidth,

        type: type,

        collected: false

    });

}

/* COLLISIONS */

function checkObstacleCollision(obstacle) {

    const catRect =
        cat.getBoundingClientRect();

    const obstacleRect =
        obstacle.element.getBoundingClientRect();

    const horizontal =

        catRect.right >
        obstacleRect.left + 12 &&

        catRect.left <
        obstacleRect.right - 12;

    const vertical =

        catRect.bottom >
        obstacleRect.top + 10;

    return horizontal && vertical;

}

function checkCoinCollision(coin) {

    const catRect =
        cat.getBoundingClientRect();

    const coinRect =
        coin.element.getBoundingClientRect();

    return (

        catRect.right >
        coinRect.left &&

        catRect.left <
        coinRect.right &&

        catRect.bottom >
        coinRect.top &&

        catRect.top <
        coinRect.bottom

    );

}

function checkBonusCollision(bonus) {

    const catRect =
        cat.getBoundingClientRect();

    const bonusRect =
        bonus.element.getBoundingClientRect();

    return (

        catRect.right >
        bonusRect.left &&

        catRect.left <
        bonusRect.right &&

        catRect.bottom >
        bonusRect.top &&

        catRect.top <
        bonusRect.bottom

    );

}

/* SAFE DISTANCE */

function canCreateObstacle() {

    if (lastObstacle === null) {

        return true;

    }

    const rect =
        lastObstacle.element
        .getBoundingClientRect();

    const gameRect =
        gameArea.getBoundingClientRect();

    return (

        rect.right <
        gameRect.right - 360

    );

}

/* BONUSES */

function applyMagnet() {

    magnetActive =
        true;

    magnetTimer =
        MAGNET_DURATION;

    updateBonusUI();

}

function applyShield() {

    shieldActive =
        true;

    updateBonusUI();

}

function applySalary() {

    salaryActive =
        true;

    salaryTimer =
        5000;

    updateBonusUI();

}

function activateBonus(type) {

    if (type === "🧲") {

        applyMagnet();

    }

    if (type === "🛡️") {

        applyShield();

    }

    if (type === "⚡") {

        applySalary();

    }

}

/* MODE MESSAGE */

function showModeMessage(text, className) {

    modeMessage.textContent =
        text;

    modeMessage.className =
        "mode-message " +
        className;

    void modeMessage.offsetWidth;

    modeMessage.classList.add("show");

}

/* NIGHT */

function activateNight() {

    if (nightMode) {

        return;

    }

    nightMode =
        true;

    gameArea.classList.add("night");

    moon.classList.remove("leave");

    moon.classList.add("enter");

    showModeMessage(

        "🌙 НАСТУПИЛА НОЧЬ",

        "night-message"

    );

}

/* DEMON */

function activateDemon() {

    if (demonMode) {

        return;

    }

    demonMode =
        true;

    moon.classList.remove("enter");

    moon.classList.add("leave");

    gameArea.classList.remove("night");

    gameArea.classList.add("demon");

    showModeMessage(

        "😈 ДЕМОНИЧЕСКИЙ РЕЖИМ",

        "demon-message"

    );

}

/* MODE */

function checkMode() {

    if (

        score >= 100 &&

        !nightMode

    ) {

        activateNight();

    }

    if (

        score >= 200 &&

        !demonMode

    ) {

        activateDemon();

    }

}

/* SHIELD CRASH */

function shieldCrash(obstacle) {

    crashInProgress =
        true;

    shieldActive =
        false;

    updateBonusUI();

    cat.classList.add(

        "cat-hit"

    );

    obstacle.element.classList.add(

        "crash-fall"

    );

    setTimeout(

        function() {

            cat.classList.remove(

                "cat-hit"

            );

            crashInProgress =
                false;

        },

        650

    );

}

/* GAME OVER */

function endGame() {

    gameOver =
        true;

    gameStarted =
        false;

    finalScoreElement.textContent =
        score;

    gameOverScreen.classList.remove(

        "hidden"

    );

}

/*

    НОВЫЙ МАГНИТ

    --------------------------------

    Монетка продолжает лететь влево

    вместе с игровым миром.

    Магнит дополнительно плавно

    приближает её к центру котика.

    Используется экспоненциальное

    приближение:

        factor = 1 - e^(-speed * time)

    Поэтому:

    - нет рывков;

    - нет перелётов;

    - нет зависимости от FPS;

    - нет странных гипербол;

    - монетка всегда постепенно

      приближается к котику.

*/

function applyMagnetForce(coin, deltaTime) {

    const catRect =
        cat.getBoundingClientRect();

    const coinRect =
        coin.element.getBoundingClientRect();

    const gameRect =
        gameArea.getBoundingClientRect();

    const catCenterX =

        catRect.left +
        catRect.width / 2;

    const catCenterY =

        catRect.top +
        catRect.height / 2;

    const coinCenterX =

        coinRect.left +
        coinRect.width / 2;

    const coinCenterY =

        coinRect.top +
        coinRect.height / 2;

    const dx =

        catCenterX -
        coinCenterX;

    const dy =

        catCenterY -
        coinCenterY;

    const distance =

        Math.sqrt(

            dx * dx +
            dy * dy

        );

    if (

        distance > MAGNET_RADIUS

    ) {

        coin.element.classList.remove(

            "magnet-active"

        );

        return;

    }

    coin.element.classList.add(

        "magnet-active"

    );

    const deltaSeconds =

        Math.min(

            deltaTime / 1000,

            0.05

        );

    const factor =

        1 -

        Math.exp(

            -MAGNET_PULL_SPEED *
            deltaSeconds

        );

    /*

        X:

        обычное движение монетки

        уже произошло выше.

        Здесь добавляем только

        плавное притяжение.

    */

    coin.x +=
        dx * factor;

    /*

        Y:

        экранная координата растёт вниз,

        а CSS bottom растёт вверх.

        Поэтому знак инвертируем.

    */

    coin.y -=
        dy * factor;

    /*

        Ограничиваем высоту,

        чтобы магнит не мог утащить

        монетку за пределы игровой зоны.

    */

    const minY =
        70;

    const maxY =

        Math.max(

            minY,

            gameArea.clientHeight - 80

        );

    coin.y =

        Math.max(

            minY,

            Math.min(

                coin.y,

                maxY

            )

        );

}

/* GAME LOOP */

function gameLoop(currentTime) {

    if (

        !gameStarted ||

        gameOver

    ) {

        return;

    }

    const deltaTime =

        currentTime -
        lastTime;

    lastTime =
        currentTime;

    const catY =
        updateJump(currentTime);

    cat.style.transform =

        `translateY(${-catY}px)`;

    let speed =

        (

            .20 +

            Math.min(

                score * .001,

                .10

            )

        ) *

        deltaTime;

    if (salaryActive) {

        speed *= .55;

    }

    /* MAGNET TIMER */

    if (magnetActive) {

        magnetTimer -=
            deltaTime;

        if (magnetTimer <= 0) {

            magnetActive =
                false;

            coins.forEach(

                function(coin) {

                    coin.element.classList.remove(

                        "magnet-active"

                    );

                }

            );

            updateBonusUI();

        }

    }

    /* SALARY TIMER */

    if (salaryActive) {

        salaryTimer -=
            deltaTime;

        if (salaryTimer <= 0) {

            salaryActive =
                false;

            updateBonusUI();

        }

    }

    updateBonusUIState();

    /* OBSTACLES */

    obstacles.forEach(

        function(obstacle) {

            obstacle.x -=
                speed;

            obstacle.element.style.left =
                obstacle.x + "px";

            if (

                !crashInProgress &&

                checkObstacleCollision(obstacle)

            ) {

                if (shieldActive) {

                    shieldCrash(obstacle);

                } else {

                    endGame();

                }

            }

        }

    );

    /* COINS */

    coins.forEach(

        function(coin) {

            /*

                Сначала монетка движется

                вместе с игровым миром.

            */

            coin.x -=
                speed;

            /*

                Затем магнит плавно

                корректирует её положение.

            */

            if (magnetActive) {

                applyMagnetForce(

                    coin,

                    deltaTime

                );

            } else {

                coin.element.classList.remove(

                    "magnet-active"

                );

            }

            coin.element.style.left =

                coin.x + "px";

            coin.element.style.bottom =

                coin.y + "px";

            if (

                !coin.collected &&

                checkCoinCollision(coin)

            ) {

                coin.collected =
                    true;

                score +=

                    salaryActive

                        ? 20

                        : 10;

                scoreElement.textContent =
                    score;

                checkMode();

                coin.element.remove();

            }

        }

    );

    /* BONUSES */

    bonuses.forEach(

        function(bonus) {

            bonus.x -=
                speed;

            bonus.element.style.left =
                bonus.x + "px";

            if (

                !bonus.collected &&

                checkBonusCollision(bonus)

            ) {

                bonus.collected =
                    true;

                activateBonus(

                    bonus.type

                );

                bonus.element.remove();

            }

        }

    );

    /* REMOVE OBSTACLES */

    obstacles =

        obstacles.filter(

            function(obstacle) {

                if (

                    obstacle.x <

                    -160

                ) {

                    obstacle.element.remove();

                    if (

                        lastObstacle ===

                        obstacle

                    ) {

                        lastObstacle =
                            null;

                    }

                    return false;

                }

                return true;

            }

        );

    /* REMOVE COINS */

    coins =

        coins.filter(

            function(coin) {

                if (

                    coin.collected ||

                    coin.x < -100

                ) {

                    if (

                        coin.element.parentElement

                    ) {

                        coin.element.remove();

                    }

                    return false;

                }

                return true;

            }

        );

    /* REMOVE BONUSES */

    bonuses =

        bonuses.filter(

            function(bonus) {

                if (

                    bonus.collected ||

                    bonus.x < -100

                ) {

                    if (

                        bonus.element.parentElement

                    ) {

                        bonus.element.remove();

                    }

                    return false;

                }

                return true;

            }

        );

    /* NEW OBSTACLE */

    obstacleTimer +=
        deltaTime;

    if (

        obstacleTimer >=

        nextObstacleTime &&

        canCreateObstacle()

    ) {

        createExpense();

        obstacleTimer =
            0;

        nextObstacleTime =

            1300 +

            Math.random() *

            1800;

    }

    /* NEW COIN */

    coinTimer +=
        deltaTime;

    if (

        coinTimer >=

        nextCoinTime

    ) {

        createCoin();

        coinTimer =
            0;

        nextCoinTime =

            900 +

            Math.random() *

            2400;

    }

    /* NEW BONUS */

    bonusTimer +=
        deltaTime;

    if (

        bonusTimer >=

        nextBonusTime

    ) {

        createBonus();

        bonusTimer =
            0;

        nextBonusTime =

            7000 +

            Math.random() *

            9000;

    }

    /* SCORE */

    scoreTimer +=
        deltaTime;

    if (

        scoreTimer >=

        1000

    ) {

        score +=

            salaryActive

                ? 2

                : 1;

        scoreElement.textContent =
            score;

        scoreTimer =
            0;

        checkMode();

    }

    requestAnimationFrame(

        gameLoop

    );

}

/* START */

function startGame() {

    score =
        0;

    gameStarted =
        true;

    gameOver =
        false;

    isJumping =
        false;

    jumpStartTime =
        null;

    lastObstacle =
        null;

    nightMode =
        false;

    demonMode =
        false;

    shieldActive =
        false;

    magnetActive =
        false;

    salaryActive =
        false;

    magnetTimer =
        0;

    salaryTimer =
        0;

    crashInProgress =
        false;

    gameArea.classList.remove(

        "night",

        "demon"

    );

    moon.classList.remove(

        "enter",

        "leave"

    );

    moon.style.opacity =
        "0";

    activeBonuses.innerHTML =
        "";

    scoreElement.textContent =
        "0";

    cat.style.transform =
        "translateY(0)";

    startScreen.classList.add(

        "hidden"

    );

    gameOverScreen.classList.add(

        "hidden"

    );

    obstacles.forEach(

        function(obstacle) {

            obstacle.element.remove();

        }

    );

    coins.forEach(

        function(coin) {

            coin.element.remove();

        }

    );

    bonuses.forEach(

        function(bonus) {

            bonus.element.remove();

        }

    );

    obstacles =
        [];

    coins =
        [];

    bonuses =
        [];

    obstacleTimer =
        0;

    coinTimer =
        0;

    bonusTimer =
        0;

    scoreTimer =
        0;

    nextObstacleTime =
        1600;

    nextCoinTime =
        1200;

    nextBonusTime =
        8000;

    lastTime =
        performance.now();

    requestAnimationFrame(

        gameLoop

    );

}

/* BUTTONS */

startButton.addEventListener(

    "click",

    function(event) {

        event.stopPropagation();

        startGame();

    }

);

restartButton.addEventListener(

    "click",

    function(event) {

        event.stopPropagation();

        startGame();

    }

);

/* TAP */

gameArea.addEventListener(

    "pointerdown",

    function(event) {

        if (

            event.target ===

            startButton ||

            event.target ===

            restartButton

        ) {

            return;

        }

        jump();

    }

);

/* SPACE */

document.addEventListener(

    "keydown",

    function(event) {

        if (

            event.code ===

            "Space"

        ) {

            event.preventDefault();

            jump();

        }

    }

);

</script>
